<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ULTIMATE MESSENGER & CALLS</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
  :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  
  /* --- АВТОРИЗАЦИЯ --- */
  #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .box { background: var(--panel); padding: 30px; border-radius: 20px; width: 320px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); }
  input, button { padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; font-size: 16px; }
  button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
  button:hover { opacity: 0.8; transform: scale(0.98); }
  .mode { text-align: center; font-size: 14px; color: #888; cursor: pointer; }
  
  /* --- ЧАТ UI --- */
  #app { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 900px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--panel); }
  #header { padding: 15px 20px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
  #my-id { color: var(--green); font-family: monospace; font-size: 16px; }
  
  #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  .m { background: #222; padding: 12px 16px; border-radius: 12px; max-width: 80%; width: fit-content; border: 1px solid #333; position: relative; }
  .m.me { align-self: flex-end; background: #0b2217; border-color: #11442b; }
  .u { font-size: 12px; color: #aaa; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .uid-badge { background: #000; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #888; }
  
  .call-btn-small { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid var(--green); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px;}
  .call-btn-small:hover { background: var(--green); color: #000; }
  
  .img-preview { max-width: 250px; border-radius: 8px; margin-top: 8px; display: block; border: 1px solid #444; }
  .file-link { display: inline-block; margin-top: 8px; color: var(--green); text-decoration: none; padding: 8px 12px; background: #000; border-radius: 8px; border: 1px solid #333; font-size: 14px;}
  
  #input-area { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; position: relative; }
  #pb-container { position: absolute; top: 0; left: 0; height: 3px; background: #222; width: 100%; }
  #pb { height: 100%; width: 0%; background: var(--green); transition: 0.2s; }
  
  /* --- ЗВОНКИ UI (Оверлей) --- */
  #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
  .video-grid { position: relative; width: 95%; max-width: 1000px; aspect-ratio: 16/9; background: #0a0a0a; border-radius: 16px; overflow: hidden; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,255,136,0.1); }
  #remote-video { width: 100%; height: 100%; object-fit: contain; }
  #local-video { position: absolute; top: 20px; right: 20px; width: 120px; height: 160px; object-fit: cover; border-radius:12px; border: 2px solid var(--green); background: #222; z-index: 10; }
  
  .call-controls { display: flex; gap: 15px; margin-top: 25px; }
  .ctrl-btn { padding: 15px 25px; border-radius: 50px; border: none; background: #222; color: #fff; cursor: pointer; font-size: 16px; font-weight: bold; border: 1px solid #444; }
  .ctrl-btn.active { background: var(--green); color: #000; border-color: var(--green); }
  .ctrl-btn.danger { background: #ff3b3b; color: #fff; border-color: #ff3b3b; }
</style>
</head>
<body>

<div id="auth">
  <div class="box">
    <h2 style="margin:0; text-align:center; color: var(--green);">СИСТЕМА</h2>
    <input id="l" placeholder="Логин" autocomplete="off">
    <input id="p" type="password" placeholder="Пароль">
    <button onclick="logIn()">ВОЙТИ</button>
    <div class="mode" onclick="toggleReg()" id="mode">Нет аккаунта? Регистрация</div>
  </div>
</div>

<div id="app">
  <div id="header">
    <div>Чат Сервер</div>
    <div>Мой ID: <span id="my-id"></span></div>
  </div>
  
  <div id="msgs"></div>
  
  <div id="input-area">
    <div id="pb-container"><div id="pb"></div></div>
    <button onclick="document.getElementById('fileInp').click()" style="padding: 14px; background: #222; color: #fff;">📎</button>
    <input type="file" id="fileInp" style="display:none">
    <input id="txt" placeholder="Сообщение..." style="flex:1; background:#111; color:#fff;" onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="padding: 14px 20px;">ОТПРАВИТЬ</button>
  </div>
</div>

<div id="call-overlay">
  <div style="color: #fff; margin-bottom: 15px; font-size: 18px; font-weight: bold;" id="call-status">Установка связи...</div>
  <div class="video-grid">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn active" id="mic-btn" onclick="toggleMic()">🎤 Микро</button>
    <button class="ctrl-btn active" id="cam-btn" onclick="toggleCam()">📷 Камера</button>
    <button class="ctrl-btn" id="screen-btn" onclick="toggleScreen()">🖥 Демка</button>
    <button class="ctrl-btn danger" onclick="endCall()">✖ Сбросить</button>
  </div>
</div>

<script>
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
let isReg = false;
let my = JSON.parse(localStorage.getItem('sys_user')) || null;

// Сокеты
let socket;
// Звонки
let peer, localStream, remoteStream, currentCall, screenStream;

// --- АВТОРИЗАЦИЯ ---
function toggleReg() {
  isReg = !isReg;
  document.querySelector('.box button').innerText = isReg ? 'РЕГИСТРАЦИЯ' : 'ВОЙТИ';
  document.getElementById('mode').innerText = isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация';
}

async function logIn() {
  const l = document.getElementById('l').value, p = document.getElementById('p').value;
  if (!l || !p) return alert("Заполни поля");
  try {
    const res = await fetch('/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login: l, password: p, isReg })
    });
    const data = await res.json();
    if (data.error) return alert(data.error);
    my = data;
    localStorage.setItem('sys_user', JSON.stringify(my));
    initSystem();
  } catch(e) { alert("Сервер недоступен"); }
}

if (my) initSystem();

// --- ИНИЦИАЛИЗАЦИЯ СИСТЕМЫ (Чат + Звонки) ---
function initSystem() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-id').innerText = '#' + my.uid;

  // 1. ПОДКЛЮЧАЕМ СОКЕТЫ
  socket = io({ reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
  
  socket.on('connect', () => {
    document.getElementById('header').style.borderBottom = "2px solid var(--green)";
    socket.emit('join', 'MainRoom');
  });
  
  socket.on('disconnect', () => {
    document.getElementById('header').style.borderBottom = "2px solid #ff3b3b"; // Индикатор дисконнекта
  });

  socket.on


('history', ms => {
    document.getElementById('msgs').innerHTML = '';
    ms.forEach(addMsg);
    scrollToBottom();
  });

  socket.on('message', m => {
    addMsg(m);
    scrollToBottom();
  });

  // 2. ПОДКЛЮЧАЕМ PEERJS (Используем чистый UID)
  peer = new Peer(my.uid, {
    host: window.location.hostname,
    port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
    path: '/peerjs',
    secure: window.location.protocol === 'https:'
  });

  peer.on('open', id => console.log('✅ PeerJS готов. ID:', id));
  peer.on('call', handleIncomingCall);
}

// --- ЛОГИКА ЧАТА И ФАЙЛОВ ---
async function sendMsg() {
  const txt = document.getElementById('txt'), fInp = document.getElementById('fileInp');
  const pb = document.getElementById('pb');
  if (!txt.value.trim() && !fInp.files[0]) return;

  let fD = null;
  // Если есть файл, сначала грузим его
  if (fInp.files[0]) {
    const fd = new FormData();
    fd.append('file', fInp.files[0]);
    try {
      fD = await new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        x.open('POST', '/upload');
        x.upload.onprogress = e => pb.style.width = (e.loaded/e.total*100)+'%';
        x.onload = () => x.status === 200 ? res(JSON.parse(x.responseText)) : rej();
        x.onerror = rej;
        x.send(fd);
      });
    } catch(e) { alert("Ошибка загрузки файла"); }
    pb.style.width = '0%';
    fInp.value = '';
  }

  // Отправляем сообщение
  socket.emit('message', {
    user: my.login, uid: my.uid, text: txt.value, room: 'MainRoom',
    fileUrl: fD?.fileUrl, fileId: fD?.fileId, fileType: fD?.fileType, fileName: fD?.fileName
  });
  txt.value = '';
}

function addMsg(m) {
  const area = document.getElementById('msgs');
  const div = document.createElement('div');
  const isMe = m.uid === my.uid;
  div.className = `m ${isMe ? 'me' : ''}`;
  
  // Кнопка звонка рендерится ТОЛЬКО для чужих сообщений
  const callBtn = !isMe ? `<button class="call-btn-small" onclick="startCall('${m.uid}')" title="Позвонить">📞 Позвонить</button>` : '';
  
  let html = `<div class="u"><b>${m.user}</b> <span class="uid-badge">#${m.uid}</span> ${callBtn}</div>`;
  if (m.text) html += `<div>${m.text}</div>`;
  
  if (m.fileUrl) {
    if (m.fileType.startsWith('image/')) html += `<img src="${m.fileUrl}" class="img-preview" onclick="window.open('${m.fileUrl}')">`;
    else if (m.fileType.startsWith('video/')) html += `<video src="${m.fileUrl}" controls class="img-preview"></video>`;
    else html += `<a href="${m.fileUrl}" download="${m.fileName}" class="file-link">💾 ${m.fileName}</a>`;
  }
  
  div.innerHTML = html;
  area.appendChild(div);
}

function scrollToBottom() {
  const area = document.getElementById('msgs');
  area.scrollTop = area.scrollHeight;
}

// --- ЛОГИКА ЗВОНКОВ (Встроено идеально) ---
async function initMedia() {
  if (!localStream) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('local-video').srcObject = localStream;
    } catch(e) { alert("Нет доступа к камере/микрофону!"); throw e; }
  }
}

async function startCall(targetUid) {
  await initMedia();
  document.getElementById('call-overlay').style.display = 'flex';
  document.getElementById('call-status').innerText = `Звонок пользователю #${targetUid}...`;
  
  // Звоним по чистому UID
  currentCall = peer.call(targetUid, localStream);
  setupCallEvents(currentCall);
}

async function handleIncomingCall(call) {
  if(confirm(`Входящий звонок от #${call.peer}! Ответить?`)) {
    await initMedia();
    document.getElementById('call-overlay').style.display = 'flex';
    document.getElementById('call-status').innerText = `Разговор с #${call.peer}`;
    currentCall = call;
    call.answer(localStream);
    setupCallEvents(call);
  } else {
    call.close();
  }
}

function setupCallEvents(call) {
  call.on('stream', stream => {
    remoteStream = stream;
    document.getElementById('remote-video').srcObject =


stream;
    document.getElementById('call-status').innerText = "На связи";
  });
  call.on('close', closeCallUI);
  call.on('error', err => { alert("Ошибка связи"); closeCallUI(); });
}

function endCall() {
  if (currentCall) currentCall.close();
  closeCallUI();
}

function closeCallUI() {
  document.getElementById('call-overlay').style.display = 'none';
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  document.getElementById('remote-video').srcObject = null;
  document.getElementById('local-video').srcObject = null;
  currentCall = null;
  
  // Сбрасываем кнопки
  document.getElementById('mic-btn').classList.add('active');
  document.getElementById('cam-btn').classList.add('active');
  document.getElementById('screen-btn').classList.remove('active');
}

// --- ПЕРЕКЛЮЧАТЕЛИ УСТРОЙСТВ ---
function toggleMic() {
  if(!localStream) return;
  const track = localStream.getAudioTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('mic-btn').classList.toggle('active', track.enabled);
}

function toggleCam() {
  if(!localStream) return;
  const track = localStream.getVideoTracks()[0];
  track.enabled = !track.enabled;
  document.getElementById('cam-btn').classList.toggle('active', track.enabled);
}

async function toggleScreen() {
  if (!currentCall) return;
  const btn = document.getElementById('screen-btn');
  const videoSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
  
  if (!screenStream) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
      const screenTrack = screenStream.getVideoTracks()[0];
      if (videoSender) videoSender.replaceTrack(screenTrack);
      document.getElementById('local-video').srcObject = screenStream;
      btn.classList.add('active');
      
      screenTrack.onended = () => toggleScreen(); // Возврат при остановке демки
    } catch(e) { console.log("Демка отменена"); }
  } else {
    // Возврат на камеру
    screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    const camTrack = localStream.getVideoTracks()[0];
    if (videoSender) videoSender.replaceTrack(camTrack);
    document.getElementById('local-video').srcObject = localStream;
    btn.classList.remove('active');
  }
}
</script>
</body>
</html>
