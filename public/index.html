<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger v12.2 Stable</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff88; --blue: #0066ff; --bg: #000; --panel: #111; --border: #222; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* AUTH */
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .box { background: var(--panel); padding: 30px; border-radius: 20px; width: 320px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
        input, button { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; outline: none; }
        button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .mode-link { text-align: center; font-size: 11px; color: #888; cursor: pointer; }

        /* CHAT */
        #chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .m { padding: 12px 16px; border-radius: 15px; background: #1a1a1a; max-width: 85%; align-self: flex-start; position: relative; border: 1px solid var(--border); line-height: 1.4; }
        .m.me { align-self: flex-end; background: var(--blue); border: none; }
        
        .u { font-size: 11px; opacity: 0.8; margin-bottom: 5px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .uid { color: var(--green); font-family: monospace; }
        .del { color: #ff3b3b; cursor: pointer; font-weight: bold; margin-left: auto; }
        
        .call-btn { background: rgba(0,255,136,0.1); border: 1px solid var(--green); color: var(--green); padding: 2px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .call-btn:hover { background: var(--green); color: #000; }

        /* UI ELEMENTS */
        .bar-c { padding: 15px; background: #0a0a0a; border-top: 1px solid var(--border); }
        .bar { display: flex; gap: 10px; align-items: center; }
        #in { flex: 1; }
        img { max-width: 100%; border-radius: 10px; margin-top: 8px; cursor: pointer; border: 1px solid #333; }
        #f { display: none; }
        .p-b { height: 3px; background: var(--green); width: 0%; transition: 0.2s; margin-bottom: 5px; }

        /* CALL OVERLAY */
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .v-grid { position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        #remote-v { width: 100%; height: 100%; object-fit: contain; }
        #local-v { position: absolute; top: 15px; right: 15px; width: 120px; height: 160px; object-fit: cover; border-radius: 10px; border: 2px solid var(--green); background: #111; }
        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .c-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: #fff; cursor: pointer; font-size: 18px; }
        .c-btn.active { background: var(--green); color: #000; }
        .c-btn.hangup { background: #ff3b3b; width: 120px; border-radius: 25px; font-weight: bold; }
    </style></head>
<body>

<div id="auth">
    <div class="box">
        <h2 id="a-t" style="text-align:center; color:var(--green); margin:0">ВХОД</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="hAuth()" id="a-b">ВОЙТИ</button>
        <div class="mode-link" onclick="tMode()" id="m-t">Нет аккаунта? Регистрация</div>
    </div>
</div>

<div id="chat">
    <div id="msgs"></div>
    <div class="bar-c">
        <div id="pb" class="p-b"></div>
        <div class="bar">
            <label for="f" style="cursor:pointer; font-size: 22px;">📎</label>
            <input type="file" id="f" onchange="document.getElementById('in').placeholder='Файл: ' + this.files[0].name">
            <input type="text" id="in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<div id="call-overlay">
    <div id="call-status" style="margin-bottom:10px; color:var(--green);">Установка соединения...</div>
    <div class="v-grid">
        <video id="remote-v" autoplay playsinline></video>
        <video id="local-v" autoplay playsinline muted></video>
    </div>
    <div class="controls">
        <button class="c-btn active" id="m-btn" onclick="tM()">🎤</button>
        <button class="c-btn active" id="v-btn" onclick="tV()">📷</button>
        <button class="c-btn" id="s-btn" onclick="tS()">🖥</button>
        <button class="c-btn hangup" onclick="end()">ЗАВЕРШИТЬ</button>
    </div>
</div>

<script>
    const socket = io();
    let my = JSON.parse(localStorage.getItem('msgr_v12_user')), isR = false;
    let peer, localStream, currentCall, screenStream;

    if(my) loginSuccess();

    function tMode() {
        isR = !isR;
        document.getElementById('a-t').innerText = isR ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('a-b').innerText = isR ? "СОЗДАТЬ" : "ВОЙТИ";
        document.getElementById('m-t').innerText = isR ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    }

    async function hAuth() {
        const login = document.getElementById('l').value, password = document.getElementById('p').value;
        if(!login || !password) return alert("Заполни всё!");
        try {
            const res = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password, isReg: isR })
            });
            const data = await res.json();
            if(data.error) return alert(data.error);
            my = data;
            localStorage.setItem('msgr_v12_user', JSON.stringify(my));
            loginSuccess();
        } catch(e) { alert("Ошибка сервера"); }
    }

    function loginSuccess() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        socket.emit('join', 'Main');
        initPeer();
    }

    // --- PEER LOGIC ---
    function initPeer() {
        peer = new Peer(my.uid, {
            host: location.hostname,
            port: location.port || (location.protocol === 'https:' ? 443 : 80),
            path: '/peerjs',
            secure: location.protocol === 'https:'
        });
        peer.on('call', async (call) => {
            if(confirm("Входящий звонок! Ответить?")) {
                await startMedia();
                document.getElementById('call-overlay').style.display = 'flex';
                call.answer(localStream);
                setupCall(call);
            } else { call.close(); }
        });
    }

    async function startMedia() {
        if(!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-v').srcObject = localStream;
        }
    }

    async function makeCall(uid) {
        await startMedia();
        document.getElementById


('call-overlay').style.display = 'flex';
        currentCall = peer.call(uid, localStream);
        if(!currentCall) return alert("Ошибка инициализации звонка");
        setupCall(currentCall);
    }

    function setupCall(call) {
        currentCall = call;
        call.on('stream', (s) => {
            document.getElementById('remote-v').srcObject = s;
            document.getElementById('call-status').innerText = "В эфире";
        });
        call.on('close', end);
        call.on('error', end);
    }

    function end() {
        if(currentCall) currentCall.close();
        document.getElementById('call-overlay').style.display = 'none';
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        if(screenStream) screenStream.getTracks().forEach(t => t.stop());
        localStream = null; screenStream = null;
        currentCall = null;
    }

    function tM() { const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled; document.getElementById('m-btn').classList.toggle('active', t.enabled); }
    function tV() { const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled; document.getElementById('v-btn').classList.toggle('active', t.enabled); }
    
    async function tS() {
        const btn = document.getElementById('s-btn');
        if(!screenStream) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
            const t = screenStream.getVideoTracks()[0];
            currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video').replaceTrack(t);
            btn.classList.add('active');
            t.onended = () => tS();
        } else {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            const t = localStream.getVideoTracks()[0];
            currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video').replaceTrack(t);
            btn.classList.remove('active');
        }
    }

    // --- CHAT LOGIC ---
    socket.on('history', list => { document.getElementById('msgs').innerHTML = ''; list.forEach(add); });
    socket.on('renderMsg', add);
    socket.on('msgDeleted', id => document.getElementById(id)?.remove());

    async function send() {
        const txt = document.getElementById('in'), fInp = document.getElementById('f'), pb = document.getElementById('pb');
        if(!txt.value.trim() && !fInp.files[0]) return;
        let fD = null;
        if(fInp.files[0]) {
            const fd = new FormData(); fd.append('file', fInp.files[0]);
            fD = await new Promise((res) => {
                const x = new XMLHttpRequest();
                x.open('POST', '/upload');
                x.upload.onprogress = e => pb.style.width = (e.loaded/e.total*100)+'%';
                x.onload = () => res(JSON.parse(x.responseText));
                x.send(fd);
            });
            pb.style.width = '0%'; fInp.value = '';
        }
        socket.emit('message', {
            user: my.login, uid: my.uid, text: txt.value, room: 'Main',
            fileUrl: fD?.fileUrl, fileId: fD?.fileId, fileType: fD?.fileType, fileName: fD?.fileName
        });
        txt.value = ''; txt.placeholder = 'Сообщение...';
    }

    function add(m) {
        const area = document.getElementById('msgs'), d = document.createElement('div');
        d.className = `m ${m.uid === my.uid ? 'me' : ''}`; d.id = m._id;
        const isMe = m.uid === my.uid;
        
        let h = `<div class="u"><span>${m.user} <small class="uid">#${m.uid.substr(2,4)}</small></span>`;
        if(!isMe) h += `<button class="call-btn" onclick="makeCall('${m.uid}')">📞 Звонок</button>`;
        if(isMe) h += `<span class="del" onclick="socket.emit('deleteMsg',{id:'${m._id}',room:'Main',fileId:'${m.fileId}'})">✕</span>`;
        h += `</div>`;
        
        if(m.text) h += `<div>${m.text}</div>`;
        if(m.fileUrl) {
            if(m.fileType?.includes('image')) h += `<img src="${m.fileUrl}" onclick="window.open(this.src)">`;
            else if(m.fileType?.includes('video')) h += `<video src="${m.fileUrl}" controls style="max-width:100%; border-radius:10px;"></video>`;
            h += `<a href="${m.fileUrl}" target="_blank" style="color:var(--green); display:block; font-size:12px; margin-top:5px; text-decoration:none;">💾 ${m.fileName}</a>`;
        }
        d.innerHTML = h; area.appendChild(d); area.scrollTop = area.scrollHeight;
    }
</script>
</body>
</html>
