<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger 2.0</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
.hidden { display: none !important; }
.box { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; }
input { padding: 12px; border-radius: 10px; border: 1px solid #444; background: #262626; color: white; outline: none; margin-bottom: 10px; width: 80%; }
button { padding: 12px 20px; border: none; border-radius: 10px; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #00c8d4; }

#chat-screen { width: 100%; max-width: 900px; height: 95vh; background: #1e1e1e; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
.top-bar { background: #252525; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }

#messages { flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
.msg { background: #2b2b2b; padding: 12px 18px; border-radius: 15px; width: fit-content; max-width: 75%; border: 1px solid #3a3a3a; }
.msg b { color: #00f2ff; display: block; font-size: 0.9em; margin-bottom: 4px; }
.time { font-size: 0.75em; color: #777; margin-left: 8px; }

.input-area { padding: 20px; background: #252525; display: flex; gap: 12px; }
</style>
</head>
<body>

<div id="auth-screen">
<div class="box">
<h2 style="color:#00f2ff">Вход в чат</h2>
<input type="text" id="username" placeholder="Твой никнейм">
<button onclick="login()">ЗАЙТИ</button>
</div>
</div>

<div id="chat-screen" class="hidden">
<div class="top-bar">
<span id="room-title" style="font-weight:bold; color:#00f2ff">Группа: Общий</span>
<div style="display:flex; gap:8px">
<input type="text" id="room-input" placeholder="Название группы" style="margin:0; width:140px; padding:6px">
<button onclick="changeRoom()" style="padding:6px 12px; font-size:0.8em">ПЕРЕЙТИ</button>
</div>
</div>

<div id="messages"></div>

<div class="input-area">
<input type="text" id="msg-input" style="flex-grow: 1; margin:0" placeholder="Напиши что-нибудь...">
<button onclick="send()">ОТПРАВИТЬ</button>
</div>
</div>

<script>
const socket = io();

function login() {
const u = document.getElementById('username').value;
if(u) socket.emit('set_user', u);
}

socket.on('login_success', () => {
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('chat-screen').classList.remove('hidden');
socket.emit('join_room', 'Общий');
});

function changeRoom() {
const r = document.getElementById('room-input').value;
if(r) {
socket.emit('join_room', r);
document.getElementById('room-input').value = '';
}
}

socket.on('room_changed', (name) => {
document.getElementById('room-title').innerText = 'Группа: ' + name;
});

function send() {
const i = document.getElementById('msg-input');
if(i.value) { socket.emit('chat_message', i.value); i.value = ''; }
}

socket.on('history', (list) => {
const m = document.getElementById('messages');
m.innerHTML = '';
list.forEach(msg => addMsg(msg));
});

socket.on('chat_message', (msg) => addMsg(msg));

function addMsg(data) {const d = document.createElement('div');
d.className = 'msg';
d.innerHTML = `<b>${data.user}</b> ${data.text} <span class="time">${data.time}</span>`;
const b = document.getElementById('messages');
b.appendChild(d);
b.scrollTop = b.scrollHeight;
}

document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
