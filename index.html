<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Messenger Pro</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #121212; color: #fff; }
.hidden { display: none !important; }

/* Экран входа */
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; }
.input-box { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; width: 250px; outline: none; }
.btn { background: #00f2ff; color: #000; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 276px; }

/* Экран чата */
#chat-screen { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; box-sizing: border-box; }
#header { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
#messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.msg { background: #2c2c2c; padding: 10px 15px; border-radius: 8px; max-width: 80%; width: fit-content; }
.msg b { color: #00f2ff; display: block; font-size: 0.8em; margin-bottom: 5px; }
#input-area { display: flex; padding: 10px; background: #1e1e1e; border-top: 1px solid #333; gap: 10px; }
#text-input { flex-grow: 1; }
</style>
</head>
<body>

<div id="login-screen">
<h2>Вход / Регистрация</h2>
<input type="text" id="username" class="input-box" placeholder="Придумай логин">
<input type="password" id="password" class="input-box" placeholder="Придумай пароль">
<button class="btn" onclick="login()">Войти</button>
</div>

<div id="chat-screen" class="hidden">
<div id="header">
<input type="text" id="room-name" class="input-box" style="width: auto; flex-grow: 1;" placeholder="Название группы (например: Игры)">
<button class="btn" style="width: auto;" onclick="joinRoom()">Зайти в группу</button>
</div>
<div id="messages"></div>
<div id="input-area">
<input type="text" id="text-input" class="input-box" placeholder="Сообщение...">
<button class="btn" style="width: auto;" onclick="sendMessage()">➤</button>
</div>
</div>

<script>
const socket = io();
const loginScreen = document.getElementById('login-screen');
const chatScreen = document.getElementById('chat-screen');
const messagesDiv = document.getElementById('messages');

// Авторизация
function login() {
const u = document.getElementById('username').value.trim();
const p = document.getElementById('password').value.trim();
if (u && p) socket.emit('login', { username: u, pass: p });
}

socket.on('login_success', (username) => {
loginScreen.classList.add('hidden');
chatScreen.classList.remove('hidden');
joinRoom('Общий'); // При старте кидаем в общий чат
});

socket.on('login_error', (err) => alert(err));

// Смена группы
function joinRoom(forceRoom) {
const room = forceRoom || document.getElementById('room-name').value.trim() || 'Общий';
document.getElementById('room-name').value = room;
messagesDiv.innerHTML = ''; // Очищаем экран при смене группы
socket.emit('join_room', room);
}

// Загрузка истории
socket.on('history', (msgs) => {
msgs.forEach(data => addMessageToUI(data));
});

// Отправка сообщений
function sendMessage() {
const text = document.getElementById('text-input').value.trim();
if (text) {
socket.emit('chat_message', text);
document.getElementById('text-input')
.value = '';
}
}

// Получение сообщений
socket.on('chat_message', (data) => addMessageToUI(data));

// Функция отрисовки
function addMessageToUI(data) {
const div = document.createElement('div');
div.className = 'msg';
div.innerHTML = `<b>${data.user}</b>${data.text}`;
messagesDiv.appendChild(div);
messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Энтер для отправки
document.getElementById('text-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
