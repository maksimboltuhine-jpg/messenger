<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALL v23 ULTIMATE</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Вход */
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: #111; padding: 30px; border-radius: 24px; width: 340px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #333; }
        input, button { padding: 15px; border-radius: 14px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; }
        button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }

        /* Видео */
        #video-grid { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; grid-template-rows: 1fr 1fr; gap: 10px; padding: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; background: #111; border: 1px solid #333; }
        .hangup { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--red); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; border: none; }

        /* Чат */
        #chat { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; border-left: 1px solid #222; border-right: 1px solid #222; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px; border-radius: 18px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .m.me { align-self: flex-end; background: #0066ff; }
        .bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #333; }
        .u { font-size: 11px; color: var(--green); margin-bottom: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="box">
            <h2 id="a-t" style="text-align:center; color:var(--green)">ВХОД</h2>
            <input type="text" id="l" placeholder="Логин">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="auth()">ВОЙТИ</button>
            <div style="text-align:center; font-size:11px; color:#888; cursor:pointer;" onclick="tMode()" id="m-t">Нет аккаунта? Регистрация</div>
        </div>
    </div>

    <div id="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <button class="hangup" onclick="endCall()">📞</button>
    </div>

    <div id="chat">
        <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
            <b>MESSENGER</b>
            <button onclick="startCall()" style="padding:5px 10px; font-size:11px;">ЗВОНОК</button>
        </div>
        <div id="msgs"></div>
        <div class="bar">
            <input type="text" id="in" placeholder="Сообщение..." style="flex:1" onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const socket = io();
        let my = null;
        let isR = false;
        let myPeer, localStream;

        function tMode() {
            isR = !isR;
            document.getElementById('a-t').innerText = isR ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElement


ById('m-t').innerText = isR ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
        }

        async function auth() {
            const login = document.getElementById('l').value;
            const password = document.getElementById('p').value;
            if(!login || !password) return alert("Заполни поля!");

            const res = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password, isReg: isR })
            });
            const data = await res.json();
            if(data.error) return alert(data.error);

            my = data;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            socket.emit('join', 'Main');
            initPeer(my.login);
        }

        function initPeer(login) {
            const cleanId = login.replace(/[^a-zA-Z0-9]/g, '');
            myPeer = new Peer(cleanId, {
                host: '/', path: '/peerjs', 
                port: location.port || (location.protocol === 'https:' ? 443 : 80),
                secure: location.protocol === 'https:'
            });

            myPeer.on('call', call => {
                if(confirm("Входящий звонок!")) {
                    navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                        localStream = stream;
                        document.getElementById('video-grid').style.display = 'grid';
                        document.getElementById('local-video').srcObject = stream;
                        call.answer(stream);
                        call.on('stream', rs => document.getElementById('remote-video').srcObject = rs);
                    });
                }
            });
        }

        function startCall() {
            const target = prompt("Логин собеседника:");
            if(!target) return;
            const cleanTarget = target.replace(/[^a-zA-Z0-9]/g, '');

            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('video-grid').style.display = 'grid';
                document.getElementById('local-video').srcObject = stream;
                const call = myPeer.call(cleanTarget, stream);
                call.on('stream', rs => document.getElementById('remote-video').srcObject = rs);
            });
        }

        function endCall() {
            location.reload();
        }

        function send() {
            const i = document.getElementById('in');
            if(!i.value.trim()) return;
            socket.emit('message', { user: my.login, uid: my.uid, text: i.value, room: 'Main' });
            i.value = '';
        }

        socket.on('history', list => {
            document.getElementById('msgs').innerHTML = '';
            list.forEach(add);
        });

        socket.on('renderMsg', add);

        function add(m) {
            const area = document.getElementById('msgs'), d = document.createElement('div');
            d.className = `m ${m.uid === my.uid ? 'me' : ''}`;
            d.innerHTML = `<div class="u">${m.user} ${m.uid}</div><div>${m.text}</div>`;
            area.appendChild(d);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
