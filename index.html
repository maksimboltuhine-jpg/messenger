<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Messenger</title>
<style>
body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: #fff; display: flex; height: 100vh; overflow: hidden; }
#login-screen { position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
#login-screen input, #login-screen select, #login-screen button { margin: 10px; padding: 15px; width: 280px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
#login-screen button { background: #ff0000; border: none; font-weight: bold; cursor: pointer; }

#chat-screen { display: none; flex-direction: column; width: 100%; max-width: 900px; margin: 0 auto; background: #111; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

.msg { background: #222; padding: 12px; border-radius: 15px; max-width: 75%; align-self: flex-start; position: relative; }
.msg.my-msg { background: #333; align-self: flex-end; border: 1px solid #444; }
.msg-author { font-size: 11px; color: #ff0000; margin-bottom: 5px; font-weight: bold; }

.msg img, .msg video { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
.msg audio { width: 100%; margin-top: 8px; }

.download-btn {
display: inline-block; margin-top: 10px; padding: 8px 15px; background: #ff0000;
color: #fff; text-decoration: none; border-radius: 8px; font-size: 12px; font-weight: bold;
}

#input-area { display: flex; padding: 20px; background: #1a1a1a; gap: 10px; align-items: center; }
#msg-input { flex: 1; padding: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
.icon-btn { cursor: pointer; font-size: 24px; background: none; border: none; color: #fff; transition: 0.2s; }
.icon-btn:hover { transform: scale(1.1); color: #ff0000; }
#file-input { display: none; }
</style>
</head>
<body>

<div id="login-screen">
<h1 style="color: #ff0000;">Messenger</h1>
<input type="text" id="username" placeholder="Никнейм">
<select id="room">
<option value="MAIN">Главная</option>
<option value="FILES">Файлообменник</option>
</select>
<button onclick="join()">ВОЙТИ</button>
</div>

<div id="chat-screen">
<div id="messages"></div>
<div id="input-area">
<label for="file-input" class="icon-btn" id="label-file">📎</label>
<input type="file" id="file-input">
<input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<button class="icon-btn" onclick="send()">➤</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let user = '', room = '';

function join() {
user = document.getElementById('username').value.trim();
room = document.getElementById('room').value;
if(!user) return;
document.getElementById('login-screen').style.display = 'none';
document.getElementById('chat-screen').style.display = 'flex';
socket.emit('joinRoom', { username: user, room: room });
}

socket.on('history', (list) => list.forEach(m => render(m)));
socket.on('message', (m) => render(m));

async function send() {
const txt = document.getElementById('msg-input');
const fInp = document.getElementById('file-input');
if(!txt.value && !fInp.files[0]) return;

let fUrl = null, fType = null;
if(fInp.files[0]) {
const fd = new FormData();
fd.append('file', fInp.files[0]);
document.getElementById('label-file').innerText = '⏳';
const res = await fetch('/upload', { method: 'POST', body: fd });
const data = await res.json();
fUrl = data.fileUrl; fType = data.fileType;
fInp.value = ''; document.getElementById('label-file').innerText = '📎';
}

socket.emit('chatMessage', { username: user, room, text: txt.value, fileUrl: fUrl, fileType: fType });
txt.value = '';
}

function render(m) {
const box = document.getElementById('messages');
const d = document.createElement('div');
d.className = `msg ${m.username === user ? 'my-msg' : ''}`;

let content = `<div class="msg-author">${m.username}</div>`;
if(m.text) content += `<div>${m.text}</div>`;

if(m.fileUrl) {
if(m.fileType.includes('image')) content += `<img src="${m.fileUrl}">`;
else if(m.fileType.includes('video')) content += `<video src="${m.fileUrl}" controls></video>`;
else if(m.fileType.includes('audio')) content += `<audio src="${m.fileUrl}" controls></audio>`;
content += `<a href="${m.fileUrl}" download class="download-btn">⬇ СКАЧАТЬ</a>`;
}

d.innerHTML = content;
box.appendChild(d);
box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
