<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESSENGER</title>
<style>
body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
#auth { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; max-width: 300px; }
button { background: #00ff88; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; }
header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; }
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 10px; }
.msg img { width: 35px; height: 35px; border-radius: 50%; }
.msg-body { background: #222; padding: 10px; border-radius: 12px; }
footer { background: #1a1a1a; padding: 10px; display: flex; gap: 10px; }
</style>
</head>
<body>
<div id="auth">
<h2>MESSENGER</h2>
<input type="text" id="l" placeholder="Логин">
<input type="password" id="p" placeholder="Пароль">
<button onclick="auth(false)">ВОЙТИ</button>
<button style="margin-top:10px; background:#333; color:#fff" onclick="auth(true)">РЕГИСТРАЦИЯ</button>
</div>

<header><div id="my-name">Профиль</div></header>
<div id="chat"></div>
<footer>
<input type="text" id="m" style="max-width: none; flex: 1;" placeholder="Сообщение...">
<button style="width: 60px" onclick="send()"»</button>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let me = {};

async function auth(isReg) {
const login = document.getElementById('l').value;
const password = document.getElementById('p').value;
const res = await fetch('/auth', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ login, password, isReg })
});
const data = await res.json();
if (data.error) return alert(data.error);
me = data;
document.getElementById('auth').style.display = 'none';
document.getElementById('my-name').innerText = me.displayName + " " + me.uid;
socket.emit('join', 'global');
}

function send() {
const text = document.getElementById('m').value;
if (!text) return;
socket.emit('message', {
user: me.login, displayName: me.displayName, uid: me.uid,
avatar: me.avatar, text, room: 'global'
});
document.getElementById('m').value = '';
}

socket.on('renderMsg', data => {
const div = document.createElement('div');
div.className = 'msg';
div.innerHTML = `<img src="${data.avatar}"><div class="msg-body"><b>${data.displayName}</b>
${data.text}</div>`;
document.getElementById('chat').appendChild(div);
document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
});

socket.on('history', h => h.forEach(m => socket.emit('renderMsg', m)));
</script>
</body>
</html>
