<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MESSENGER v12</title>
<style>
* { box-sizing: border-box; }
body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }

/* Авторизация */
#auth { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; max-width: 300px; }
button { background: #00ff88; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; margin-bottom: 5px; }

/* Чат */
header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
.msg img.av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
.msg-body { background: #222; padding: 10px; border-radius: 12px; position: relative; }
.u-info { font-size: 10px; color: #00ff88; margin-bottom: 4px; display: block; }

/* Профиль */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
.card { background: #1a1a1a; padding: 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 320px; }
.av-big { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #00ff88; margin-bottom: 15px; cursor: pointer; }

footer { background: #1a1a1a; padding: 10px; display: flex; gap: 10px; }
#file-indicator { font-size: 10px; color: #00ff88; position: absolute; bottom: 60px; left: 10px; }
</style>
</head>
<body>

<div id="auth">
<h2>MESSENGER</h2>
<input type="text" id="l" placeholder="Логин">
<input type="password" id="p" placeholder="Пароль">
<button onclick="auth(false)">ВОЙТИ</button>
<button style="background:#333; color:#fff" onclick="auth(true)">РЕГИСТРАЦИЯ</button>
</div>

<header>
<div id="my-name" onclick="openProfile()" style="cursor:pointer">Загрузка...</div>
<div>ROOM: <span id="room-id">Global</span></div>
</header>

<div id="chat"></div>
<div id="file-indicator"></div>

<footer>
<input type="file" id="f" hidden onchange="showFile()">
<button style="width:50px" onclick="document.getElementById('f').click()">+</button>
<input type="text" id="m" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')send()">
<button style="width:80px" onclick="send()"»</button>
</footer>

<div class="overlay" id="p-overlay">
<div class="card">
<h3>РЕДАКТИРОВАТЬ</h3>
<img id="p-av" src="" class="av-big" onclick="document.getElementById('p-f').click()">
<input type="file" id="p-f" hidden accept="image/*" onchange="uploadAv(this)">
<div id="p-uid" style="color:#555; margin-bottom:10px">#0000</div>
<input type="text" id="p-name" placeholder="Отображаемое имя">
<button onclick="saveProfile()">СОХРАНИТЬ</button>
<button style="background:#333; color:#fff" onclick="closeProfile()">ЗАКРЫТЬ</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let me = { login: '', uid: '', avatar: '', displayName: '' };
let curRoom = 'global';

async function auth(isReg) {
const login = document.getElementById('l').value;
const password = document.getElementById('p').value;
const res = await fetch('/auth', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ login, password, isReg })
});
const data = await res.json();
if (data.error) return alert(data.error);

me = data;
document.getElementById('auth').style.display = 'none';
document.getElementById('my-name').innerText = `${me.displayName} ${me.uid}`;
socket.emit('join', curRoom);
}

function renderMsg(data) {
const div = document.createElement('div');
div.className = 'msg';
div.innerHTML = `
<img src="${data.avatar}" class="av" onclick="viewUser('${data.uid}')">
<div class="msg-body">
<span class="u-info">${data.displayName} ${data.uid}</span>
${data.text ? `<div>${data.text}</div>` : ''}
${data.fileUrl ? `<img src="${data.fileUrl}" style="max-width:200px; border-radius:8px; margin-top:5px">` : ''}
</div>
`;
const chat = document.getElementById('chat');
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function send() {
const text = document.getElementById('m').value;
const file = document.getElementById('f').files[0];
let fileData = null;

if (file) {
const formData = new FormData();
formData.append('file', file);
const res = await fetch('/upload', { method: 'POST', body: formData });
fileData = await res.json();
}

if (!text && !fileData) return;

socket.emit('message', {
user: me.login,
displayName: me.displayName,
uid: me.uid,
avatar: me.avatar,
text,
fileUrl: fileData ? fileData.fileUrl : null,
room: curRoom
});

document.getElementById('m').value = '';
document.getElementById('f').value = '';
document.getElementById('file-indicator').innerText = '';
}

function showFile() {
const file = document.getElementById('f').files[0];
if(file) document.getElementById('file-indicator').innerText = "Выбран файл: " + file.name;
}

// Логика профиля
function openProfile() {
document.getElementById('p-overlay').style.display = 'flex';
document.getElementById('p-av').src = me.avatar;
document.getElementById('p-name').value = me.displayName;
document.getElementById('p-uid').innerText = me.uid;
}

function closeProfile() { document.getElementById('p-overlay').style.display = 'none'; }

async function uploadAv(input) {
const file = input.files[0];
const formData = new FormData();
formData.append('file', file);
const res = await fetch('/upload', { method: 'POST', body: formData });
const data = await res.json();
document.getElementById('p-av').src = data.fileUrl;
me.avatar = data.fileUrl;
}

async function saveProfile() {
const displayName = document.getElementById('p-name').value;
const res = await fetch('/update-profile', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ login: me.login, displayName, avatar: me.avatar })
});
if (res.ok) {
me.displayName = displayName;document.getElementById('my-name').innerText = `${me.displayName} ${me.uid}`;
closeProfile();
alert("Обновлено!");
}
}

socket.on('renderMsg', renderMsg);
socket.on('history', (h) => {
document.getElementById('chat').innerHTML = '';
h.forEach(renderMsg);
});
</script>
</body>
</html>
