<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MSGR v13.2 ULTIMATE</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --blue: #0066ff; }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Авторизация */
#auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
.box { background: #111; padding: 30px; border-radius: 24px; width: 340px; border: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
input, button { padding: 15px; border-radius: 14px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; transition: 0.2s; }
button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }
button:active { transform: scale(0.95); }

/* Чат */
#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; position: relative; }
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.m { padding: 12px 16px; border-radius: 18px; background: #1a1a1a; max-width: 80%; align-self: flex-start; border: 1px solid #222; position: relative; }
.m.me { align-self: flex-end; background: var(--blue); border: none; }
.u { font-size: 11px; opacity: 0.7; margin-bottom: 4px; font-weight: bold; display: flex; justify-content: space-between; }
.uid-tag { color: var(--green); cursor: pointer; margin-left: 8px; }

/* Звонок */
#call-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
#v-cont { width: 95%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid #333; }
video { width: 100%; height: 100%; object-fit: contain; background: #000; }
#local-v { position: absolute; top: 15px; right: 15px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid var(--green); z-index: 10; transform: scaleX(-1); object-fit: cover; }

.controls { display: flex; gap: 15px; margin-top: 25px; }
.btn-c { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; cursor: pointer; transition: 0.2s; }
.btn-c.off { background: var(--red) !important; }
.btn-c.active { background: var(--green) !important; color: #000; }

#incoming { display: none; position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid var(--green); z-index: 1100; text-align: center; box-shadow: 0 10px 30px rgba(0,255,136,0.2); }
</style>
</head>
<body>

<div id="auth">
<div class="box">
<h2 style="text-align:center; color:var(--green); margin:0 0 10px 0">MESSENGER</h2>
<input type="text" id="l" placeholder="Логин">
<input type="password" id="p" placeholder="Пароль">
<button onclick="hAuth()" id="auth-btn">ВОЙТИ</button>
<div style="text-align:center; font-size:12px; color:#666; cursor:pointer" onclick="toggleReg()" id="reg-link">Создать аккаунт</div>
</div>
</div>

<div id="incoming">
<div style="font-weight:bold; margin-bottom:15px">ВХОДЯЩИЙ ВЫЗОВ</div>
<div style="display:flex; gap:10px">
<button onclick="answerCall()" style="flex:1">ОТВЕТИТЬ</button>
<button onclick="location.reload()" style="background:var(--red); flex:1">СБРОСИТЬ</button>
</div>
</div>

<div id="chat">
<div style="padding:15px; background:#0a0a0a; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center">
<div id="my-info" style="font-weight:bold; color:var(--green)"></div>
<button onclick="const t=prompt('Введите UID для звонка (только цифры):'); if(t)startCall(t)" style="padding:8px 15px; font-size:13px">📞 ПОЗВОНИТЬ</button>
</div>

<div id="msgs"></div>

<div id="call-overlay">
<div id="v-cont">
<video id="remote-v" autoplay playsinline></video>
<video id="local-v" autoplay playsinline muted></video>
</div>
<div class="controls">
<div class="btn-c" id="m-btn" onclick="toggleMic()">🎤</div>
<div class="btn-c" id="v-btn" onclick="toggleCam()">📷</div>
<div class="btn-c" id="s-btn" onclick="toggleScreen()">🖥</div>
<div class="btn-c" style="background:var(--red)" onclick="location.reload()">📞</div>
</div>
</div>

<div style="padding:15px; background:#0a0a0a; border-top:1px solid #222; display:flex; gap:10px">
<input type="text" id="in" style="flex:1" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()" style="width:60px">➤</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
let socket = io(), peer, my, localStream, currentCall, screenStream, isR = false;

// Авто-логин
if(localStorage.getItem('msgr_v13_user')) {
my = JSON.parse(localStorage.getItem('msgr_v13_user'));
loginSuccess();
}

function toggleReg() {
isR = !isR;
document.getElementById('auth-btn').innerText = isR ? "РЕГИСТРАЦИЯ" : "ВОЙТИ";
document.getElementById('reg-link').innerText = isR ? "Уже есть аккаунт?" : "Создать аккаунт";
}

async function hAuth() {
const login = document.getElementById('l').value, password = document.getElementById('p').value;
try {
const res = await fetch('/auth', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({login, password, isReg: isR})
});
const data = await res.json();
if(data.error) return alert(data.error);
my = data;
localStorage.setItem('msgr_v13_user', JSON.stringify(my));
loginSuccess();
} catch(e) { alert("Сервер недоступен. Подожди 5 сек."); }
}

function loginSuccess() {
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
document.getElementById('my-info').innerText = `${my.login} (#${my.uid})`;
socket.emit('join', 'Main');

// Инициализация PeerJS на UID пользователя
peer = new Peer(my.uid, {
host: location.hostname,
port: location.port || 443,
path: '/peerjs',
secure: true
});

peer.on('call', call => {
currentCall = call;
document.getElementById('incoming').style.display = 'block';
});

peer.on('error', err => console.error('PeerJS Error:', err));
}

async function answerCall() {
document.getElementById('incoming').style.display = 'none';
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
currentCall.answer(localStream);
setupCallUI(currentCall);
} catch(e) { alert("Ошибка доступа к камере!"); }
}

async function startCall(id) {
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
const call = peer.call(id, localStream);
setupCallUI(call);
}catch(e) { alert("Включи камеру в настройках браузера!"); }
}

function setupCallUI(call) {
currentCall = call;
document.getElementById('call-overlay').style.display = 'flex';
document.getElementById('local-v').srcObject = localStream;
call.on('stream', stream => {
document.getElementById('remote-v').srcObject = stream;
});
call.on('close', () => location.reload());
}

function toggleMic() {
const track = localStream.getAudioTracks()[0];
track.enabled = !track.enabled;
document.getElementById('m-btn').classList.toggle('off', !track.enabled);
}

function toggleCam() {
const track = localStream.getVideoTracks()[0];
track.enabled = !track.enabled;
document.getElementById('v-btn').classList.toggle('off', !track.enabled);
}

async function toggleScreen() {
if(!currentCall) return;
const videoSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');

if (!screenStream) {
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
videoSender.replaceTrack(screenStream.getVideoTracks()[0]);
document.getElementById('local-v').srcObject = screenStream;
document.getElementById('s-btn').classList.add('active');

screenStream.getVideoTracks()[0].onended = () => toggleScreen();
} catch(e) { console.log("Демка отменена"); }
} else {
screenStream.getTracks().forEach(t => t.stop());
screenStream = null;
videoSender.replaceTrack(localStream.getVideoTracks()[0]);
document.getElementById('local-v').srcObject = localStream;
document.getElementById('s-btn').classList.remove('active');
}
}

// Логика чата
socket.on('history', list => {
const area = document.getElementById('msgs');
area.innerHTML = '';
list.forEach(add);
});

socket.on('renderMsg', add);

function send() {
const input = document.getElementById('in');
if(!input.value.trim()) return;
socket.emit('message', {
user: my.login,
uid: '#' + my.uid,
text: input.value,
room: 'Main'
});
input.value = '';
}

function add(m) {
const area = document.getElementById('msgs'), d = document.createElement('div');
const isMe = m.uid === '#' + my.uid || m.uid === my.uid;
d.className = `m ${isMe ? 'me' : ''}`;
d.innerHTML = `
<div class="u">${m.user} <span class="uid-tag" onclick="startCall('${m.uid.replace('#','')}')">${m.uid}</span></div>
<div>${m.text}</div>
`;
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
