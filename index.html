<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v33 FIXED</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --panel: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; display: none; }
        .box { background: var(--panel); padding: 30px; border-radius: 24px; border: 1px solid #333; width: 85%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        input, button { padding: 15px; border-radius: 14px; border: 1px solid #333; background: #080808; color: #fff; outline: none; font-size: 16px; }
        button { background: var(--green); color: #000; font-weight: bold; border: none; cursor: pointer; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #status { font-size: 11px; color: #777; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #1a1a1a; padding: 12px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #0055ff; }
        #call-ui { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #lv { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border: 2px solid var(--green); border-radius: 15px; object-fit: cover; z-index: 5001; }
        .hang { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--red); width: 75px; height: 75px; border-radius: 50%; border: none; color: #fff; font-size: 32px; z-index: 5002; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="box">
        <h2 style="text-align:center; margin:0">Messenger</h2>
        <input type="text" id="login-input" placeholder="Логин">
        <input type="password" id="pass-input" placeholder="Пароль">
        <button onclick="startLogin(false)">ВОЙТИ</button>
        <button onclick="startLogin(true)" style="background:#222; color:#fff">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="chat-ui">
    <header>
        <div>
            <b id="nick-display" style="color:var(--green)"></b>

            <span id="status">Подключение...</span>
        </div>
        <button id="call-btn" onclick="initiateCall()" disabled style="opacity:0.5; padding: 10px 15px;">📞 ЗВОНОК</button>
    </header>
    <div id="msgs"></div>
    <div style="padding:15px; display:flex; gap:10px; background:#111; border-top:1px solid #333">
        <input type="file" id="file-input" style="display:none" onchange="sendMessage()">
        <button onclick="document.getElementById('file-input').click()" style="width:50px">📎</button>
        <input type="text" id="msg-input" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="width:60px">➤</button>
    </div>
</div>

<div id="call-ui">
    <video id="rv" autoplay playsinline></video>
    <video id="lv" autoplay playsinline muted></video>
    <button class="hang" onclick="location.reload()">❌</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, userData, localStream;

    window.onload = () => {
        const saved = localStorage.getItem('msgr_v33_session');
        if(saved) {userData = JSON.parse(saved);
            launchApp();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    };

    async function startLogin(isReg) {
        const login = document.getElementById('login-input').value;
        const password = document.getElementById('pass-input').value;
        
        const res = await fetch('/auth', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({login, password, isReg}) 
        });
        const data = await res.json();
        
        if(data.error) return alert(data.error);
        
        userData = data;
        localStorage.setItem('msgr_v33_session', JSON.stringify(userData));
        launchApp();
    }

    function launchApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('nick-display').innerText = `${userData.login} (#${userData.uid})`;

        // ОЧИЩАЕМ ID ОТ СИМВОЛА # ДЛЯ PEERJS
        const cleanId = userData.uid.replace('#', '');
        peer = new Peer('msgr-' + cleanId);

        peer.on('open', () => {
            document.getElementById('status').innerText = 'В сети';
            document.getElementById('call-btn').disabled = false;
            document.getElementById('call-btn').style.opacity = '1';
        });

        peer.on('call', async call => {
            if(confirm("Входящий звонок!")) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                    call.answer(localStream);
                    showCall(call);
                } catch(e) { alert("Ошибка камеры"); }
            }
        });

        socket.emit('join', 'Main');
    }

    async function initiateCall() {
        const id = prompt('ID друга (только цифры):');
        if(!id) return;
        const cleanTarget = id.replace('#', '').trim();
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const call = peer.call('msgr-' + cleanTarget, localStream);
            showCall(call);
        } catch(e) { alert("Ошибка камеры"); }
    }

    function showCall(call) {
        document.getElementById('call-ui').style.display = 'block';
        document.getElementById('lv').srcObject = localStream;
        call.on('stream', s => {
            document.getElementById('rv').srcObject = s;
        });
    }

    async function sendMessage() {
        const m = document.getElementById('msg-input'), f = document.getElementById('file-input');
        let fData = null;
        if(f.files[0]) {
            const fd = new FormData(); fd.append('file', f.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            fData = await res.json();
        }
        if(m.value.trim() || fData) {
            socket.emit('message', { user: userData.login, uid: userData.uid, text: m.value, room: 'Main', ...fData });
            m.value = ''; f.value = '';
        }
    }

    socket.on('history', h => { document.getElementById('msgs').innerHTML = ''; h.forEach(render); });
    socket.on('renderMsg', render);

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${m.uid === userData.uid ? 'me' : ''}`;
        d.innerHTML = `<b>#${m.uid} ${m.user}</b>
${m.text || ''}` + (m.fileUrl ? `
<a href="${m.fileUrl}" style="color:var(--green)" download>💾 Файл</a>` : '');
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
