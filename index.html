<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v19</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --blue: #0066ff; --panel: #111; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Auth */
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .box { background: var(--panel); padding: 30px; border-radius: 24px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; font-size: 16px; }
        button { background: var(--green); color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* Chat */
        #chat-ui { display: none; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; width: 100%; background: #050505; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #0044aa; }
        .uid-tag { cursor: pointer; font-weight: bold; color: var(--green); }

        /* Call Screen - ИСПРАВЛЕННЫЙ ЛЕЙАУТ */
        #call-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; flex-direction: column; }
        
        .v-container { 
            flex: 1; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background: #000;
        }

        #r-vid { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Чтобы демка была большой, а камера не перекрывала кнопки */
            max-height: 100%;
        }

        #l-vid { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            width: 90px; 
            height: 120px; 
            border-radius: 12px; 
            border: 2px solid var(--green); 
            object-fit: cover; 
            transform: scaleX(-1); 
            background: #111; 
            z-index: 4001; 
        }
        
        .call-footer { 
            height: 100px; 
            background: var(--panel); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            border-top: 1px solid #333;
            z-index: 4002; /* Кнопки всегда сверху */
        }

        .btn-c { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; cursor: pointer; }
        .btn-c.off { background: var(--red); }
        .btn-c.active { background: var(--blue); }

        #inc-call { display: none; position: fixed; top: 20px; left: 10px; right: 10px; background: #1a1a1a; padding: 20px; border-radius: 24px; border: 2px solid var(--green); z-index: 9999; text-align: center; }
        #pb { position: absolute; top: 0; left: 0; height: 3px; background: var(--green); width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 style="text-align:center; margin:0 0 10px 0;">MSGR v19</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="auth(false)">ВОЙТИ</button>
        <button onclick="auth(true)" styl


e="background:#222; color:#fff;">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="inc-call">
    <div style="margin-bottom:15px; font-weight:bold">ВХОДЯЩИЙ ВЫЗОВ</div>
    <div style="display:flex; gap:10px">
        <button style="flex:1" onclick="acceptCall()">ОТВЕТИТЬ</button>
        <button style="flex:1; background:var(--red)" onclick="location.reload()">СБРОСИТЬ</button>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:15px; background:var(--panel); border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
        <span id="user-info" style="font-weight:bold"></span>
        <button onclick="const id=prompt('ID пользователя:'); if(id) makeCall(id)" style="padding:8px 15px; font-size:14px">📞 Позвонить</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:10px 15px; background:var(--panel); display:flex; gap:10px; align-items:center; position:relative;">
        <div id="pb"></div>
        <input type="file" id="f-in" style="display:none" onchange="send()">
        <button onclick="document.getElementById('f-in').click()" style="background:#222; width:50px;">📎</button>
        <input type="text" id="msg-in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()" style="width:60px">➤</button>
    </div>
</div>

<div id="call-screen">
    <div class="v-container">
        <video id="r-vid" autoplay playsinline></video>
        <video id="l-vid" autoplay playsinline muted></video>
    </div>
    <div class="call-footer">
        <div class="btn-c" onclick="toggleMic()" id="m-btn">🎤</div>
        <div class="btn-c" onclick="toggleCam()" id="v-btn">📷</div>
        <div class="btn-c" onclick="toggleScreen()" id="s-btn">🖥</div>
        <div class="btn-c" style="background:var(--red)" onclick="location.reload()">📞</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream, screenStream, currentCall;

    if(localStorage.getItem('msgr_v19')) {
        my = JSON.parse(localStorage.getItem('msgr_v19'));
        startApp();
    }

    async function auth(isReg) {
        const login = document.getElementById('l').value, password = document.getElementById('p').value;
        const res = await fetch('/auth', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        my = data;
        localStorage.setItem('msgr_v19', JSON.stringify(my));
        startApp();
    }

    function startApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('user-info').innerText = `${my.login} (#${my.uid})`;
        const cleanId = String(my.uid).replace('#', '');
        peer = new Peer(cleanId, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });
        peer.on('call', call => { currentCall = call; document.getElementById('inc-call').style.display = 'block'; });
        socket.emit('join', 'Main');
    }

    async function makeCall(id) {
        const targetId = String(id).replace('#', '');
        if (targetId === String(my.uid).replace('#', '')) return alert('Нельзя звонить себе');
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            showCallUI(peer.call(targetId, localStream));
        } catch (e) { alert("Ошибка камеры"); }
    }

    async function acceptCall() {
        document.getElementById('inc-call').style.display = 'none';
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            currentCall.answer(localStream);showCallUI(currentCall);
        } catch (e) { alert("Ошибка доступа"); }
    }

    function showCallUI(call) {
        if(!call) return alert("Ошибка связи");
        currentCall = call;
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('l-vid').srcObject = localStream;
        call.on('stream', s => { 
            const rv = document.getElementById('r-vid');
            rv.srcObject = s; 
            rv.play(); 
        });
    }

    // ИСПРАВЛЕННАЯ ДЕМКА СО ЗВУКОМ
    async function toggleScreen() {
        if (!navigator.mediaDevices.getDisplayMedia) return alert("Не поддерживается на мобилках");
        
        const videoSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        const audioSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'audio');

        if (!screenStream) {
            try {
                // Запрашиваем экран и звук системы
                screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                
                // Меняем видео
                videoSender.replaceTrack(screenStream.getVideoTracks()[0]);
                
                // Если пользователь разрешил звук в демке, меняем и его
                if (screenStream.getAudioTracks().length > 0 && audioSender) {
                    audioSender.replaceTrack(screenStream.getAudioTracks()[0]);
                }

                document.getElementById('l-vid').srcObject = screenStream;
                document.getElementById('s-btn').classList.add('active');
                
                screenStream.getVideoTracks()[0].onended = () => toggleScreen();
            } catch(e) { console.log("Отмена демки"); }
        } else {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            videoSender.replaceTrack(localStream.getVideoTracks()[0]);
            if (audioSender) audioSender.replaceTrack(localStream.getAudioTracks()[0]);
            
            document.getElementById('l-vid').srcObject = localStream;
            document.getElementById('s-btn').classList.remove('active');
        }
    }

    function toggleMic() {
        const t = localStream.getAudioTracks()[0];
        t.enabled = !t.enabled; document.getElementById('m-btn').classList.toggle('off', !t.enabled);
    }
    function toggleCam() {
        const t = localStream.getVideoTracks()[0];
        t.enabled = !t.enabled; document.getElementById('v-btn').classList.toggle('off', !t.enabled);
    }

    socket.on('history', h => h.forEach(render));
    socket.on('renderMsg', render);

    async function send() {
        const i = document.getElementById('msg-in'), f = document.getElementById('f-in');
        if(!i.value.trim() && !f.files[0]) return;
        let fData = null;
        if(f.files[0]) {
            const fd = new FormData();
            fd.append('file', f.files[0]);
            fData = await new Promise(r => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/upload');
                xhr.upload.onprogress = e => document.getElementById('pb').style.width = (e.loaded/e.total*100)+'%';
                xhr.onload = () => r(JSON.parse(xhr.responseText));
                xhr.send(fd);
            });
            document.getElementById('pb').style.width = '0%';
            f.value = '';
        }
        socket.emit('message', { user: my.login, uid: my.uid, text: i.value, room: 'Main', fileUrl: fData?.fileUrl, fileType: fData?.fileType, fileName: fData?.fileName });
        i.value = '';
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${String(m.uid) === String(my.uid) ? 'me' : ''}`;
        let html = `<div><span class="uid-tag" onclick="makeCall('${m.uid}')">#${m.uid}</span><b>${m.user}</b></div>`;
        if (m.text) html += `<div>${m.text}</div>`;
        i


f (m.fileUrl) {
            if (m.fileType?.startsWith('image/')) html += `<img src="${m.fileUrl}" style="max-width:100%; border-radius:10px; margin-top:8px; display:block;">`;
            html += `<a href="${m.fileUrl}" target="_blank" download="${m.fileName}" style="color:var(--green); text-decoration:none; display:block; margin-top:8px; font-size:13px; background:#000; padding:8px; border-radius:8px; border:1px solid #333;">💾 Скачать: ${m.fileName}</a>`;
        }
        d.innerHTML = html;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
