<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ULTIMATE MESSENGER</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<style>
  :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .box { background: var(--panel); padding: 30px; border-radius: 20px; width: 320px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); }
  input, button { padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; }
  button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }
  #app { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 900px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); }
  #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .m { background: #222; padding: 10px 15px; border-radius: 12px; max-width: 80%; width: fit-content; }
  .m.me { align-self: flex-end; background: #0b2217; border: 1px solid #11442b; }
  .u { font-size: 11px; color: #888; margin-bottom: 5px; }
  #input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--border); }
  #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .video-container { width: 90%; max-width: 800px; aspect-ratio: 16/9; position: relative; background: #000; }
  #remote-video { width: 100%; height: 100%; }
  #local-video { position: absolute; top: 10px; right: 10px; width: 100px; border: 2px solid var(--green); }
</style>
</head>
<body>

<div id="auth">
  <div class="box">
    <h2 style="text-align:center; color: var(--green);">СИСТЕМА</h2>
    <input id="l" placeholder="Логин">
    <input id="p" type="password" placeholder="Пароль">
    <button onclick="logIn()">ВОЙТИ</button>
    <div id="mode" style="text-align:center; cursor:pointer; font-size:13px;" onclick="toggleReg()">Нет аккаунта? Регистрация</div>
  </div>
</div>

<div id="app">
  <div style="padding:15px; background:#000; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
    <span>Messenger</span>
    <span id="my-id" style="color:var(--green)"></span>
  </div>
  <div id="msgs"></div>
  <div id="input-area">
    <input id="txt" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">📎</button>
    <button onclick="sendMsg()">ОТПРАВИТЬ</button>
  </div>
</div>

<div id="call-overlay">
  <div id="call-status" style="margin-bottom:10px">Связь...</div>
  <div class="video-container">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
  </div>
  <button onclick="endCall()" style="margin-top:20px; background:#ff3b3b; color:#fff; padding:10px 30px; border-radius:30px;">СБРОСИТЬ</button>
</div>

<script>
let isReg = false, my = JSON.parse(localStorage.getItem('sys_user')), socket, peer, localStream, currentCall;

function toggleReg() {
  isReg = !isReg;
  document.querySelector('.box button').innerText = isReg ? 'РЕГИСТРАЦИЯ' : 'ВОЙТИ';
  document.getElementById('mode').innerText = isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация';
}

async function logIn() {
  const l = document.getElementById('l').value, p = document.ge


tElementById('p').value;
  if (!l || !p) return alert("Заполни поля");
  try {
    const res = await fetch('/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login: l, password: p, isReg })
    });
    const data = await res.json();
    if (data.error) return alert(data.error);
    my = data;
    localStorage.setItem('sys_user', JSON.stringify(my));
    initSystem();
  } catch(e) { alert("Сервер недоступен"); }
}

if (my) initSystem();

function initSystem() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-id').innerText = '#' + my.uid;

  socket = io();
  socket.on('connect', () => socket.emit('join', 'MainRoom'));
  socket.on('history', ms => { document.getElementById('msgs').innerHTML = ''; ms.forEach(addMsg); scrollToBottom(); });
  socket.on('message', m => { addMsg(m); scrollToBottom(); });

  peer = new Peer(my.uid, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });
  peer.on('call', async call => {
    if (confirm("Входящий звонок! Ответить?")) {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('local-video').srcObject = localStream;
      document.getElementById('call-overlay').style.display = 'flex';
      call.answer(localStream);
      call.on('stream', s => document.getElementById('remote-video').srcObject = s);
      currentCall = call;
    }
  });
}

function addMsg(m) {
  const area = document.getElementById('msgs');
  const div = document.createElement('div');
  const isMe = m.uid === my.uid;
  div.className = `m ${isMe ? 'me' : ''}`;
  const btn = !isMe ? `<button onclick="startCall('${m.uid}')" style="font-size:10px; margin-left:10px;">📞</button>` : '';
  div.innerHTML = `<div class="u"><b>${m.user}</b> #${m.uid} ${btn}</div><div>${m.text}</div>`;
  area.appendChild(div);
}

function sendMsg() {
  const txt = document.getElementById('txt');
  if (!txt.value.trim()) return;
  socket.emit('message', { user: my.login, uid: my.uid, text: txt.value, room: 'MainRoom' });
  txt.value = '';
}

function scrollToBottom() { const msgs = document.getElementById('msgs'); msgs.scrollTop = msgs.scrollHeight; }

async function startCall(id) {
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById('local-video').srcObject = localStream;
  document.getElementById('call-overlay').style.display = 'flex';
  currentCall = peer.call(id, localStream);
  currentCall.on('stream', s => document.getElementById('remote-video').srcObject = s);
}

function endCall() {
  if (currentCall) currentCall.close();
  location.reload();
}
</script>
</body>
</html>
