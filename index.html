<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger v6.0</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

.v-tag { position: fixed; top: 10px; right: 10px; background: #222; padding: 5px 10px; border-radius: 5px; font-size: 10px; color: #ff0044; border: 1px solid #ff0044; z-index: 1000; }

#auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
.login-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 300px; display: flex; flex-direction: column; gap: 15px; }

input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
button { background: #ff0044; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #ff4477; }

#chat-window { display: none; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; width: 100%; background: #0a0a0a; }
#msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

.msg { padding: 12px; border-radius: 12px; background: #1a1a1a; max-width: 80%; align-self: flex-start; word-wrap: break-word; }
.msg.me { align-self: flex-end; background: #ff0044; }
.meta { font-size: 10px; opacity: 0.6; margin-bottom: 5px; font-weight: bold; }

img, video { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
.download { display: inline-block; margin-top: 10px; padding: 8px; color: #00ff88; text-decoration: none; border: 1px solid #00ff88; border-radius: 5px; font-size: 12px; }

.input-row { display: flex; padding: 20px; background: #111; gap: 10px; align-items: center; border-top: 1px solid #222; }
#text-input { flex: 1; background: #222; }
.btn { font-size: 24px; cursor: pointer; color: #ff0044; user-select: none; }
#file-input { display: none; }
</style>
</head>
<body>

<div class="v-tag">v6.0</div>

<div id="auth-screen">
<div class="login-box">
<h2 style="text-align:center; margin:0; color:#ff0044;">MESSENGER</h2>
<input type="text" id="username" placeholder="Никнейм">
<select id="room-select">
<option value="Global">🌍 Общий</option>
<option value="Private">🔒 Приват</option>
</select>
<button onclick="init()">ВОЙТИ</button>
</div>
</div>

<div id="chat-window">
<div id="msg-area"></div>
<div class="input-row">
<label for="file-input" class="btn" id="clip-btn">📎</label>
<input type="file" id="file-input">
<input type="text" id="text-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
<div class="btn" onclick="sendMessage()">➤</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ transports: ['websocket', 'polling'] });
let user = '', room = '';

function init() {
user = document.getElementById('username').value.trim();
room = document.getElementById('room-select').value;
if(!user) return alert('Ник введи!');
document.getElementById('auth-screen').style.display = 'none';
document.getElementById('chat-window').style.display = 'flex';
socket.emit('join', { user, room });
}

socket.on('history', (data) => {
document.getElementById('msg-area').innerHTML = '';
data.forEach(display);
});

socket.on('renderMsg', (data) => display(data));

async function sendMessage() {
const textEl = document.getElementById('text-input');
const fileEl = document.getElementById('file-input');
const clip = document.getElementById('clip-btn');

if(!textEl.value.trim() && !fileEl.files[0]) return;

let fUrl = null, fType = null;

// Сначала грузим файл, если он есть
if(fileEl.files[0]) {
clip.innerText = '⏳';
const formData = new FormData();
formData.append('file', fileEl.files[0]);
try {
const res = await fetch('/upload', { method: 'POST', body: formData });
if(!res.ok) throw new Error('Upload fail');
const savedFile = await res.json();
fUrl = savedFile.fileUrl;
fType = savedFile.fileType;
} catch(e) {
console.error(e);
alert('Файл не улетел');
}
fileEl.value = '';
clip.innerText = '📎';
}

// Отправляем данные через сокет
socket.emit('message', {
user,
room,
text: textEl.value,
fileUrl: fUrl,
fileType: fType
});

textEl.value = '';
}

function display(m) {
if(!m) return;
const area = document.getElementById('msg-area');
const d = document.createElement('div');
d.className = `msg ${m.user === user ? 'me' : ''}`;

let content = `<div class="meta">${m.user}</div>`;
if(m.text) content += `<div>${m.text}</div>`;

if(m.fileUrl) {
const type = m.fileType || '';
if(type.includes('image')) content += `<img src="${m.fileUrl}">`;
else if(type.includes('video')) content += `<video src="${m.fileUrl}" controls></video>`;
else if(type.includes('audio')) content += `<audio src="${m.fileUrl}" controls></audio>`;
else content += `<div style="margin:10px 0;">📁 Файл</div>`;

content += `<a href="${m.fileUrl}" download class="download">⬇ СКАЧАТЬ</a>`;
}

d.innerHTML = content;
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
