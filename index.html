<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v24</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --panel: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .box { background: var(--panel); padding: 30px; border-radius: 24px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; font-size: 16px; }
        button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }

        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 10px 15px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #0044aa; }

        #call-ui { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        .v-cont { flex: 1; position: relative; background: #000; }
        #remote-v { width: 100%; height: 100%; object-fit: contain; }
        #local-v { position: absolute; top: 20px; right: 20px; width: 100px; height: 130px; border: 2px solid var(--green); border-radius: 10px; object-fit: cover; }
        .footer { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #111; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 style="text-align:center">MSGR v24</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="auth(false)">ВОЙТИ</button>
        <button onclick="auth(true)" style="background:#222; color:#fff">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:15px; background:var(--panel); display:flex; justify-content:space-between; align-items:center;">
        <b id="u-info"></b>
        <button onclick="const id=prompt('Введите ID:'); if(id) makeCall(id)" style="padding:10px">📞</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; display:flex; gap:10px; background:var(--panel)">
        <input type="text" id="m-in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<div id="call-ui">
    <div class="v-cont">
        <video id="remote-v" autoplay playsinline></video>
        <video id="local-v" autoplay playsinline muted></video>
    </div>
    <div class="footer">
        <button onclick="location.reload()" style="background:var(--red); width:60px; height:60px; border-radius:50%">❌</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream, currentCall;

    async function auth(isReg) {
        const login = document.getElementById('l').value;
        const password = document.getElementById('p').value;
        if(!login || !password) return alert("Заполни поля");

        const res = await fetch('/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);

        my = data;
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('u-info').innerText = `${my.login} (#${my.uid})`;

        // Чистим ID от решетки для PeerJS
        const cleanId = my.uid.replace('#', '');
        peer = new Peer(cleanId, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });

        peer.on('call', async call => {
            if(confirm("Входящий вызов! Ответить?")) {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                call.answer(localStream);
                showCallUI(call);
            }
        });

        socket.emit('join', 'Main');
    }

    async function makeCall(id) {
        const targetId = id.replace('#', '');
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const call = peer.call(targetId, localStream);
            showCallUI(call);
        } catch(e) { alert("Нет доступа к камере"); }
    }

    function showCallUI(call) {
        currentCall = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('local-v').srcObject = localStream;
        call.on('stream', s => { document.getElementById('remote-v').srcObject = s; });
    }

    function send() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        socket.emit('message', { user: my.login, uid: my.uid, text: i.value, room: 'Main' });
        i.value = '';
    }

    socket.on('history', h => h.forEach(render));
    socket.on('renderMsg', render);

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${m.uid === my.uid ? 'me' : ''}`;
        d.innerHTML = `<b>#${m.uid} ${m.user}</b>
${m.text}`;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
