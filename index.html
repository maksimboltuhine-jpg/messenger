<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Stable v38</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #auth { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #chat { display: none; flex-direction: column; height: 100%; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; }
        button { background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .msg { background: #222; padding: 8px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .msg.me { align-self: flex-end; background: #0055ff; }
        
        /* Тот самый старый экран видео */
        #video-box { display: none; position: fixed; inset: 0; background: #000; z-index: 200; }
        video { width: 100%; height: 50%; background: #111; object-fit: contain; }
        #lv { height: 25%; border: 2px solid #00ff88; }
        .call-ctrl { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div id="auth">
    <h2>MSGR v38</h2>
    <input type="text" id="l" placeholder="Логин">
    <input type="password" id="p" placeholder="Пароль">
    <button onclick="auth(false)">Войти</button>
    <button onclick="auth(true)" style="background:#222; color:#fff">Регистрация</button>
</div>

<div id="chat">
    <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center">
        <b id="my-nick"></b>
        <button onclick="call()">📞 Звонок</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:10px; display:flex; background:#111">
        <input type="text" id="m" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key=='Enter') send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<div id="video-box">
    <video id="rv" autoplay playsinline></video>
    <video id="lv" autoplay playsinline muted></video>
    <div class="call-ctrl">
        <button onclick="location.reload()" style="background:red; color:#fff; border-radius:50%; width:60px; height:60px">❌</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream;

    async function auth(isReg) {
        const login = document.getElementById('l').value;
        const password = document.getElementById('p').value;
        const res = await fetch('/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        my = data;
        startApp();
    }

    function startApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        // Вернул ID через решетку рядом с ником
        document.getElementById('my-nick').innerText = my.login + " (#" + my.uid + ")";

        // ВАЖНО: При создании peer убираем решетку из ID, чтобы не было ошибки как на скрине
        const peerId = 'msgr-' + my.uid.toString().replace('#', '');
        peer = new Peer(peerId);

        peer.on('call', async (c) => {
            if(confirm("Входящий звонок!")) {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                c.answer(localStream);
                showVideo(c);}
        });
        socket.emit('join');
    }

    async function call() {
        const id = prompt("Введите ID (только цифры):");
        if(!id) return;
        // Очищаем введенный ID от решеток
        const targetId = 'msgr-' + id.replace('#', '').trim();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            const c = peer.call(targetId, localStream);
            showVideo(c);
        } catch(e) { alert("Камера недоступна"); }
    }

    function showVideo(c) {
        document.getElementById('video-box').style.display = 'block';
        document.getElementById('lv').srcObject = localStream;
        c.on('stream', (s) => {
            const remoteVid = document.getElementById('rv');
            remoteVid.srcObject = s;
            // Принудительный старт для браузеров
            remoteVid.play().catch(() => {
                remoteVid.muted = true;
                remoteVid.play();
            });
        });
    }

    function send() {
        const m = document.getElementById('m');
        if(m.value.trim()) {
            socket.emit('message', { user: my.login, uid: my.uid, text: m.value });
            m.value = '';
        }
    }

    socket.on('history', (h) => { document.getElementById('msgs').innerHTML = ''; h.forEach(render); });
    socket.on('renderMsg', render);

    function render(data) {
        const d = document.createElement('div');
        d.className = 'msg' + (data.uid == my.uid ? ' me' : '');
        d.innerHTML = `<b>${data.user}</b>
${data.text}`;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 9999;
    }
</script>
</body>
</html>
