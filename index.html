<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE V23.1 FIXED</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #222; padding: 10px 15px; border-radius: 12px; max-width: 80%; width: fit-content; }
        .msg b { color: var(--green); font-size: 12px; display: block; }
        #input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 10px; outline: none; }
        button { background: var(--green); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #call-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        video { width: 90%; max-width: 400px; border-radius: 20px; background: #000; }
        #local-video { width: 80px; height: 110px; position: absolute; top: 20px; right: 20px; border: 2px solid var(--green); }
    </style>
</head>
<body>

<div id="header">
    <div id="my-id">ID: LOADING...</div>
    <button onclick="startCallPrompt()">📞 ЗВОНОК</button>
</div>

<div id="msgs"></div>

<div id="input-area">
    <input type="text" id="m-input" placeholder="Сообщение...">
    <button onclick="sendMsg()">➤</button>
</div>

<div id="call-ui">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <button style="margin-top:20px; background:#ff3b3b; color:#fff;" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>

<script>
    var socket, peer, localStream;
    var myName = localStorage.getItem('p_name') || prompt("Твоё имя:") || "Аноним";
    localStorage.setItem('p_name', myName);

    var myId = localStorage.getItem('p_id') || 'id-' + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('p_id', myId);

    // 1. Инициализация Сокетов
    socket = io();
    socket.emit('join', 'MainRoom');

    socket.on('history', function(data) {
        data.forEach(addMsg);
    });

    socket.on('message', function(data) {
        addMsg(data);
    });

    // 2. Инициализация PeerJS
    peer = new Peer(myId, {
        host: window.location.hostname,
        port: 443,
        path: '/peerjs',
        secure: true
    });

    peer.on('open', function(id) {
        document.getElementById('my-id').innerText = "Твой ID: " + id;
    });

    peer.on('call', function(call) {
        if(confirm("Входящий звонок! Ответить?")) {
            navigator.mediaDevices.getUserMedia({video: true, audio: true})
                .then(function(s) {
                    localStream = s;
                    call.answer(s);
                    showCallUI(call);
                });
        }
    });

    function sendMsg() {
        var inp = document.getElementById('m-input');
        if(!inp.value) return;
        socket.emit('message', { user: myName, text: inp.value, room: 'MainRoom' });
        inp.value = '';
    }

    function addMsg(data) {
        var div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = '<b>' + data.user + '</b>' + data.text;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    function startCallPrompt() {
        var tid = prompt("Введи ID друга:");
        if(!tid) return;
        navigator.mediaDevices.getUserMedia({video: true, audio: true})
            .then(function(s) {
                localStream = s;
                var call = peer.call(tid, s);
                showCallUI(call);
            });
    }

    function showCallUI(call) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('local-video').srcObject = localStream;
        call.on('stream', function(rs) {
            document.getElementById('remote-video').srcObject = rs;
        });
    }
</script>
</body>
</html>
