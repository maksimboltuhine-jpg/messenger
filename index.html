<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; default-src 'self' https: wss:; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.socket.io; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE SYSTEM</title>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m { background: #222; padding: 12px; border-radius: 12px; width: fit-content; max-width: 85%; border-left: 3px solid var(--green); }
        .m b { color: var(--green); display: block; font-size: 11px; margin-bottom: 4px; }
        #input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { flex: 1; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--green); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        #call-ui { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        video { width: 90%; max-width: 450px; border-radius: 20px; background: #111; aspect-ratio: 3/4; object-fit: cover; }
    </style>
</head>
<body>

<div id="header">
    <div id="my-id" style="font-family: monospace;">ID: Загрузка...</div>
    <button onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="msgs"></div>

<div id="input-area">
    <input id="txt" placeholder="Написать сообщение..." autocomplete="off">
    <button onclick="send()">➤</button>
</div>

<div id="call-ui">
    <video id="remote-v" autoplay playsinline></video>
    <video id="local-v" autoplay playsinline muted style="width:100px; height:130px; position:absolute; top:20px; right:20px; border:2px solid var(--green); border-radius: 10px;"></video>
    <button onclick="location.reload()" style="margin-top:25px; background:#ff3b3b; color:#fff;">СБРОСИТЬ</button>
</div>

<script>
    var socket, peer, stream;
    var uName = localStorage.getItem('u_name') || prompt("Имя:") || "User";
    localStorage.setItem('u_name', uName);

    // Уникальный ID, чтобы не было ошибок "unavailable-id"
    var uID = localStorage.getItem('u_id') || 'u' + Math.floor(Math.random() * 9999);
    localStorage.setItem('u_id', uID);

    // Никаких стрелочных функций (=>), только классика!
    socket = io();
    socket.emit('join', 'MainRoom');

    socket.on('history', function(ms) {
        ms.forEach(addMsg);
    });

    socket.on('message', function(m) {
        addMsg(m);
    });

    peer = new Peer(uID, {
        host: window.location.hostname,
        port: 443,
        path: '/peerjs',
        secure: true
    });

    peer.on('open', function(id) {
        document.getElementById('my-id').innerText = "ТВОЙ ID: " + id;
    });

    peer.on('call', function(call) {
        if(confirm("Входящий звонок! Ответить?")) {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(function(s) {
                stream = s;
                call.answer(s);
                showUI(call);
            });
        }
    });

    function send() {
        var i = document.getElementById('txt');
        if(!i.value) return;
        socket.emit('message', { user: uName, text: i.value, room: 'MainRoom' });
        i.value = '';
    }

    function addMsg(m) {
        var d = document.createElement('div');
        d.className = 'm';
        d.innerHTML = '<b>' + m.user + '</b>' + m.text;
        var b = document.getElementById('msgs');
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    function makeCall() {
        var tid = prompt("ID друга:");
        if(!tid) return;
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(function(s) {
            stream = s;
            var call = peer.call(tid, s);
            showUI(call);
        }).catch(function() { alert("Доступ к камере запрещен!"); });
    }

    function showUI(call) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('local-v').srcObject = stream;
        call.on('stream', function(rs) {
            document.getElementById('remote-v').srcObject = rs;
        });
    }
</script>
</body>
</html>
