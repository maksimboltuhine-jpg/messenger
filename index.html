<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger v7.1</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
.v { position: fixed; top: 10px; right: 10px; color: #ff0044; font-size: 12px; border: 1px solid #ff0044; padding: 4px; border-radius: 4px; z-index: 1000; }

#auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
.box { background: #111; padding: 30px; border-radius: 15px; width: 300px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }

input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
button { background: #ff0044; border: none; font-weight: bold; cursor: pointer; }

#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; }
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

.m { padding: 12px; border-radius: 12px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
.m.me { align-self: flex-end; background: #ff0044; }
.u { font-size: 10px; opacity: 0.5; margin-bottom: 4px; }

img, video { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; border: 1px solid #333; }
.dl { display: inline-block; margin-top: 10px; padding: 8px; color: #00ff88; text-decoration: none; border: 1px solid #00ff88; border-radius: 5px; font-size: 11px; }

/* Панель ввода и превью */
.bar-container { background: #111; border-top: 1px solid #222; padding: 10px; }
#file-preview { font-size: 12px; color: #00ff88; padding: 5px 10px; display: none; }
#progress-container { width: 100%; height: 4px; background: #222; display: none; margin-bottom: 10px; }
#progress-bar { height: 100%; width: 0%; background: #ff0044; transition: width 0.2s; }

.bar { display: flex; gap: 10px; align-items: center; }
#in { flex: 1; }
.btn { font-size: 24px; cursor: pointer; color: #ff0044; }
#f { display: none; }
</style>
</head>
<body>

<div class="v">v7.1</div>

<div id="auth">
<div class="box">
<h2 style="text-align:center; color:#ff0044;">LOG IN v7.1</h2>
<input type="text" id="nick" placeholder="Ник">
<select id="room">
<option value="Main">Общий</option>
<option value="Dev">Разработка</option>
</select>
<button onclick="go()">ВОЙТИ</button>
</div>
</div>

<div id="chat">
<div id="msgs"></div>
<div class="bar-container">
<div id="progress-container"><div id="progress-bar"></div></div>
<div id="file-preview"></div>
<div class="bar">
<label for="f" class="btn">📎</label>
<input type="file" id="f" onchange="previewFile()">
<input type="text" id="in" placeholder="Текст..." onkeypress="if(event.key==='Enter')send()">
<div class="btn" onclick="send()">➤</div>
</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ transports: ['websocket', 'polling'] });
let user = '', room = '';

function go() {
user = document.getElementById('nick').value.trim();
room = document.getElementById('room').value;
if(!user) return;
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
socket.emit('join', { user, room });
}

// Показ выбранного файла
function previewFile() {
const f = document.getElementById('f');
const p = document.getElementById('file-preview');
if(f.files[0]) {
p.innerText = "📄 Выбран файл: " + f.files[0].name;
p.style.display = 'block';
} else {
p.style.display = 'none';
}
}

socket.on('history', (list) => {
document.getElementById('msgs').innerHTML = '';
list.forEach(add);
});

socket.on('renderMsg', add);

async function send() {
const txt = document.getElementById('in');
const file = document.getElementById('f');
const preview = document.getElementById('file-preview');
const progCont = document.getElementById('progress-container');
const progBar = document.getElementById('progress-bar');

if(!txt.value.trim() && !file.files[0]) return;

let fUrl = null, fType = null;

if(file.files[0]) {
progCont.style.display = 'block';
const fd = new FormData();
fd.append('file', file.files[0]);

try {
// Используем XMLHttpRequest для отслеживания прогресса
const xhr = new XMLHttpRequest();
xhr.open('POST', '/upload', true);

xhr.upload.onprogress = (e) => {
if (e.lengthComputable) {
const percent = Math.round((e.loaded / e.total) * 100);
progBar.style.width = percent + '%';
}
};

const uploadPromise = new Promise((resolve, reject) => {
xhr.onload = () => resolve(JSON.parse(xhr.responseText));
xhr.onerror = () => reject();
xhr.send(fd);
});

const data = await uploadPromise;
fUrl = data.fileUrl;
fType = data.fileType;
} catch(e) { console.error(e); }

progCont.style.display = 'none';
progBar.style.width = '0%';
preview.style.display = 'none';
file.value = '';
}

socket.emit('message', { user, room, text: txt.value, fileUrl: fUrl, fileType: fType });
txt.value = '';
}

function add(m) {
const area = document.getElementById('msgs');
const d = document.createElement('div');
d.className = `m ${m.user === user ? 'me' : ''}`;

let html = `<div class="u">${m.user}</div>`;
if(m.text) html += `<div>${m.text}</div>`;

if(m.fileUrl) {
const isImg = m.fileType?.includes('image');
const isVid = m.fileType?.includes('video');
const isAud = m.fileType?.includes('audio');

if(isImg) html += `<img src="${m.fileUrl}" onclick="window.open(this.src)">`;
else if(isVid) html += `<video src="${m.fileUrl}" controls></video>`;
else if(isAud) html += `<audio src="${m.fileUrl}" controls></audio>`;
else html += `<div style="margin:10px 0; color:#00ff88;">📁 Документ</div>`;

html += `<a href="${m.fileUrl}" download class="dl">⬇ СКАЧАТЬ</a>`;
}

d.innerHTML = html;
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
