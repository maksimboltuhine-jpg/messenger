<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Pro</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
.hidden { display: none !important; }
.box { background: #1e1e1e; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; outline: none; }
button { padding: 12px; border: none; border-radius: 8px; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #00c8d4; }
#chat-container { width: 100%; max-width: 800px; height: 90vh; background: #1e1e1e; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
#messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.msg { background: #2b2b2b; padding: 10px 15px; border-radius: 12px; width: fit-content; max-width: 80%; }
.msg b { color: #00f2ff; display: block; font-size: 0.85em; margin-bottom: 4px; }
.input-area { padding: 20px; background: #252525; display: flex; gap: 10px; }
</style>
</head>
<body>

<div id="auth-screen">
<div class="box">
<h2 style="text-align:center; margin: 0 0 10px 0;">Вход</h2>
<input type="text" id="username" placeholder="Логин">
<input type="password" id="password" placeholder="Пароль">
<button onclick="login()">ВОЙТИ</button>
</div>
</div>

<div id="chat-screen" class="hidden">
<div id="chat-container">
<div style="padding: 15px; background: #252525; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
<span id="display-user" style="color: #00f2ff; font-weight: bold;"></span>
<input type="text" id="room-name" placeholder="Комната" style="padding: 5px; width: 100px;" onchange="changeRoom()">
</div>
<div id="messages"></div>
<div class="input-area">
<input type="text" id="message-text" style="flex-grow: 1;" placeholder="Напишите сообщение...">
<button onclick="sendMessage()">Отправить</button>
</div>
</div>
</div>

<script>
const socket = io();
let myName = "";

function login() {
const u = document.getElementById('username').value;
const p = document.getElementById('password').value;
if(u && p) socket.emit('login', { username: u, pass: p });
}

socket.on('login_success', (name) => {
myName = name;
document.getElementById('display-user').innerText = "Вы: " + name;
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('chat-screen').classList.remove('hidden');
socket.emit('join_room', 'Общий');
});

socket.on('login_error', (err) => alert(err));

function changeRoom() {
const room = document.getElementById('room-name').value || 'Общий';
document.getElementById('messages').innerHTML = '';
socket.emit('join_room', room);
}

function sendMessage() {
const inp = document.getElementById('message-text');
if(inp.value) { socket.emit('chat_message', inp.value); inp.value = ''; }
}

socket.on('history', (msgs) => msgs.forEach(m => addMsg(m)));
socket.on('chat_message', (m) => addMsg(m));

function addMsg(data) {
const div = document.createElement('div');
div.className = 'msg';
div.innerHTML = `<b>${data.user}</b> ${data.text}`;
const box = document.getElementById('messages');
box.appendChild(div);
box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
