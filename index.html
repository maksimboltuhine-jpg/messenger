<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger v8.3 Nitro</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.v { position: fixed; top: 10px; right: 10px; color: #00ff88; font-size: 10px; border: 1px solid #00ff88; padding: 3px 6px; border-radius: 4px; z-index: 1000; }

#auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
.box { background: #111; padding: 25px; border-radius: 20px; width: 300px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }

input, select, button { padding: 12px; border-radius: 12px; border: 1px solid #444; background: #1a1a1a; color: #fff; outline: none; }
button { background: #00ff88; color: #000; border: none; font-weight: bold; cursor: pointer; }

#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; border-left: 1px solid #222; border-right: 1px solid #222; }
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

.m { padding: 12px 16px; border-radius: 18px; background: #151515; max-width: 80%; align-self: flex-start; border: 1px solid #222; position: relative; transition: 0.3s; }
.m.me { align-self: flex-end; background: #0066ff; border: none; }
.u { font-size: 10px; opacity: 0.6; margin-bottom: 4px; font-weight: bold; }

/* Кнопка удаления */
.del-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; opacity: 0; font-size: 14px; color: #ff0044; transition: 0.2s; }
.m:hover .del-btn { opacity: 1; }

img, video, audio { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
audio { height: 40px; filter: invert(1); width: 100%; }
.f-name { font-size: 12px; color: #00ff88; margin-bottom: 4px; display: block; font-weight: bold; }
.dl { display: inline-block; margin-top: 10px; padding: 6px 12px; color: #00ff88; text-decoration: none; border: 1px solid #00ff88; border-radius: 8px; font-size: 10px; font-weight: bold; }

.bar-container { background: #0a0a0a; border-top: 1px solid #222; padding: 15px; }
#info { font-size: 11px; color: #00ff88; margin-bottom: 8px; display: none; }
#p-c { width: 100%; height: 4px; background: #111; display: none; margin-bottom: 10px; border-radius: 10px; overflow: hidden; }
#p-b { height: 100%; width: 0%; background: #00ff88; transition: width 0.1s; }

.bar { display: flex; gap: 10px; align-items: center; }
#in { flex: 1; }
.btn { font-size: 26px; cursor: pointer; color: #0066ff; }
#f { display: none; }
</style>
</head>
<body>

<div class="v">v8.3 NITRO</div>

<div id="auth">
<div class="box">
<h2 style="text-align:center; color:#00ff88; margin:0;">MESSENGER</h2>
<input type="text" id="nick" placeholder="Ник">
<select id="room">
<option value="Main">Общий</option>
<option value="Secret">Приват</option>
</select>
<button onclick="go()">ВОЙТИ</button>
</div>
</div>

<div id="chat">
<div id="msgs"></div>
<div class="bar-container">
<div id="p-c"><div id="p-b"></div></div>
<div id="info"></div>
<div class="bar">
<label for="f" class="btn">📎</label>
<input type="file" id="f" onchange="uFile()">
<input type="text" id="in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<div class="btn" onclick="send()">➤</div>
</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>;
<script>
const socket = io({ transports: ['websocket', 'polling'] });
let user = '', room = '';

function go() {
user = document.getElementById('nick').value.trim();
room = document.getElementById('room').value;
if(!user) return;
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
socket.emit('join', { user, room });
}

function uFile() {
const f = document.getElementById('f');
const inf = document.getElementById('info');
if(f.files[0]) { inf.innerText = "📁 " + f.files[0].name; inf.style.display = 'block'; }
}

socket.on('history', list => {
const area = document.getElementById('msgs');
area.innerHTML = '';
list.forEach(add);
});

socket.on('renderMsg', add);
socket.on('msgDeleted', id => {
const el = document.getElementById(id);
if(el) el.remove();
});

async function send() {
const txt = document.getElementById('in');
const fInp = document.getElementById('f');
const pc = document.getElementById('p-c');
const pb = document.getElementById('p-b');
const inf = document.getElementById('info');

if(!txt.value.trim() && !fInp.files[0]) return;

let fUrl = null, fType = null, fName = null;

if(fInp.files[0]) {
pc.style.display = 'block';
const fd = new FormData();
fd.append('file', fInp.files[0]);

try {
const xhr = new XMLHttpRequest();
xhr.open('POST', '/upload', true);
xhr.upload.onprogress = e => { pb.style.width = Math.round((e.loaded / e.total) * 100) + '%'; };
const res = await new Promise((resolve, reject) => {
xhr.onload = () => resolve(JSON.parse(xhr.responseText));
xhr.onerror = reject;
xhr.send(fd);
});
fUrl = res.fileUrl; fType = res.fileType; fName = res.fileName;
} catch(e) { console.error(e); }
pc.style.display = 'none'; pb.style.width = '0%'; inf.style.display = 'none'; fInp.value = '';
}

socket.emit('message', { user, room, text: txt.value, fileUrl: fUrl, fileType: fType, fileName: fName });
txt.value = '';
}

function deleteMessage(id) {
if(confirm('Удалить сообщение?')) {
socket.emit('deleteMsg', { id, room });
}
}

function add(m) {
if (document.getElementById(m._id)) return; // Защита от дублей

const area = document.getElementById('msgs');
const d = document.createElement('div');
d.className = `m ${m.user === user ? 'me' : ''}`;
d.id = m._id; // Присваиваем ID для удаления

let h = `<div class="u">${m.user}</div>`;
// Крестик удаления только для своих сообщений (или всех, если хочешь админить)
if(m.user === user) h += `<div class="del-btn" onclick="deleteMessage('${m._id}')">✕</div>`;

if(m.text) h += `<div>${m.text}</div>`;

if(m.fileUrl) {
if(m.fileType?.includes('image')) h += `<img src="${m.fileUrl}" onclick="window.open(this.src)">`;
else if(m.fileType?.includes('video')) h += `<video src="${m.fileUrl}" controls></video>`;
else if(m.fileType?.includes('audio')) {
h += `<span class="f-name">🎵 ${m.fileName || 'Music'}</span>`;
h += `<audio src="${m.fileUrl}" controls></audio>`;
}
else h += `<span class="f-name">📄 ${m.fileName || 'File'}</span>`;
h += `<a href="${m.fileUrl}" download="${m.fileName || ''}" class="dl">СКАЧАТЬ</a>`;
}
d.innerHTML = h; area.appendChild(d);
area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
