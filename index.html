<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Pro</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin: 0; background: #121212; color: white; font-family: sans-serif; }
.hidden { display: none !important; }
#auth, #chat { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
#chat { justify-content: flex-start; }
.box { background: #1e1e1e; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; width: 300px; }
input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
button { padding: 10px; border: none; border-radius: 5px; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; }
#messages { flex-grow: 1; width: 100%; max-width: 600px; overflow-y: auto; padding: 20px; box-sizing: border-box; }
.msg { background: #262626; padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; width: fit-content; max-width: 80%; }
.msg b { color: #00f2ff; font-size: 0.8em; display: block; }
</style>
</head>
<body>

<div id="auth">
<div class="box">
<h3 style="text-align:center">Вход / Регистрация</h3>
<input type="text" id="user" placeholder="Логин">
<input type="password" id="pass" placeholder="Пароль">
<button onclick="doLogin()">ВОЙТИ</button>
</div>
</div>

<div id="chat" class="hidden">
<div style="width: 100%; background: #1e1e1e; padding: 10px; display: flex; justify-content: center; gap: 10px;">
<input type="text" id="room" placeholder="Название группы" style="width: 150px;">
<button onclick="doJoin()">Сменить группу</button>
</div>
<div id="messages"></div>
<div style="width: 100%; max-width: 600px; display: flex; padding: 10px; gap: 10px; box-sizing: border-box;">
<input type="text" id="mText" style="flex-grow: 1;" placeholder="Сообщение...">
<button onclick="doSend()">Отправить</button>
</div>
</div>

<script>
const socket = io();

function doLogin() {
const username = document.getElementById('user').value;
const pass = document.getElementById('pass').value;
if(username && pass) socket.emit('login', { username, pass });
}

socket.on('login_success', () => {
document.getElementById('auth').classList.add('hidden');
document.getElementById('chat').classList.remove('hidden');
doJoin('Общий');
});

socket.on('login_error', (m) => alert(m));

function doJoin(name) {
const room = name || document.getElementById('room').value || 'Общий';
document.getElementById('messages').innerHTML = '';
socket.emit('join_room', room);
}

socket.on('history', (list) => list.forEach(m => drawMsg(m)));
socket.on('chat_message', (m) => drawMsg(m));

function doSend() {
const i = document.getElementById('mText');
if(i.value) { socket.emit('chat_message', i.value); i.value = ''; }
}

function drawMsg(data) {
const d = document.createElement('div');
d.className = 'msg';
d.innerHTML = `<b>${data.user}</b>${data.text}`;
const container = document.getElementById('messages');
container.appendChild(d);
container.scrollTop = container.scrollHeight;
}
</script>
</body>
</html>
