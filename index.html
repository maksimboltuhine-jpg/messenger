<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v25.5</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --panel: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .box { background: var(--panel); padding: 30px; border-radius: 24px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #050505; color: #fff; font-size: 16px; }
        button { background: var(--green); color: #000; font-weight: bold; border: none; cursor: pointer; }

        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 10px 15px; border-radius: 18px; max-width: 85%; align-self: flex-start; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #0044aa; }

        #call-ui { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        .v-cont { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        #remote-v { width: 100%; height: 100%; object-fit: contain; }
        #local-v { position: absolute; top: 20px; right: 20px; width: 100px; height: 130px; border: 2px solid var(--green); border-radius: 12px; object-fit: cover; z-index: 10; }
        .footer { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #111; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 style="text-align:center">MSGR v25.5</h2>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="authAction(false)">ВОЙТИ</button>
        <button onclick="authAction(true)" style="background:#222; color:#fff">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:15px; background:var(--panel); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333">
        <b id="u-name" style="color:var(--green)"></b>
        <button onclick="makeCall(prompt('ID друга (только цифры):'))">📞 Позвонить</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:10px; display:flex; gap:10px; background:var(--panel)">
        <input type="file" id="file-in" style="display:none" onchange="sendMessage()">
        <button onclick="document.getElementById('file-in').click()" style="width:50px">📎</button>
        <input type="text" id="msg-in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="width:60px">➤</button>
    </div>
</div>

<div id="call-ui">
    <div class="v-cont">
        <video id="remote-v" autoplay playsinline></video>
        <video id="local-v" autoplay playsinline muted></video>
    </div>
    <div class="footer">
        <button onclick="location.reload()" style="background:var(--red); width:60px; height:60px; border-radius:50%; border:none; color:white; font-size:24px">❌</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream, currentCall;

    async function authAction(isReg) {
        const login = document.getElementById('login'


).value;
        const password = document.getElementById('pass').value;
        if(!login || !password) return alert("Заполни поля");

        const res = await fetch('/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);

        my = data;
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('u-name').innerText = `${my.login} (#${my.uid})`;

        // PEERJS ИНИЦИАЛИЗАЦИЯ (ID без решетки)
        peer = new Peer(my.uid, {
            host: location.hostname,
            port: location.port || (location.protocol === 'https:' ? 443 : 80),
            path: '/peerjs',
            secure: location.protocol === 'https:'
        });

        peer.on('call', async call => {
            if(confirm("Входящий вызов! Ответить?")) {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                call.answer(localStream);
                showCallUI(call);
            }
        });

        socket.emit('join', 'Main');
    }

    async function makeCall(id) {
        if(!id) return;
        const targetId = id.replace('#', '');
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const call = peer.call(targetId, localStream);
            if(call) showCallUI(call);
        } catch(e) { alert("Ошибка доступа к камере"); }
    }

    function showCallUI(call) {
        currentCall = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('local-v').srcObject = localStream;
        call.on('stream', s => { 
            const rv = document.getElementById('remote-v');
            rv.srcObject = s;
            rv.play();
        });
    }

    async function sendMessage() {
        const input = document.getElementById('msg-in');
        const fileInput = document.getElementById('file-in');
        let fData = null;

        if(fileInput.files[0]) {
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: fd });
            fData = await res.json();
        }

        if(input.value.trim() || fData) {
            socket.emit('message', {
                user: my.login, uid: my.uid, text: input.value, room: 'Main',
                fileUrl: fData?.fileUrl, fileName: fData?.fileName, fileType: fData?.fileType
            });
            input.value = '';
            fileInput.value = '';
        }
    }

    socket.on('history', h => h.forEach(render));
    socket.on('renderMsg', render);

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${m.uid === my.uid ? 'me' : ''}`;
        let content = `<b>#${m.uid} ${m.user}</b>
${m.text || ''}`;
        if(m.fileUrl) {
            if(m.fileType?.startsWith('image/')) {
                content += `
<img src="${m.fileUrl}" style="max-width:100%; border-radius:10px; margin-top:5px">`;
            }
            content += `
<a href="${m.fileUrl}" style="color:var(--green); text-decoration:none" download="${m.fileName}">💾 ${m.fileName}</a>`;
        }
        d.innerHTML = content;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
