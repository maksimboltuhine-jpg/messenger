<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger v23</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Твои стили */
        :root { --green: #00ff88; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { background: #111; padding: 30px; border-radius: 20px; width: 320px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #333; }
        input, button { padding: 14px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; }
        button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        #chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px; border-radius: 15px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .m.me { align-self: flex-end; background: #0066ff; }
        .u { font-size: 10px; color: var(--green); margin-bottom: 3px; }
        .bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 id="title" style="text-align:center; color:var(--green)">ВХОД</h2>
        <input type="text" id="logInp" placeholder="Логин">
        <input type="password" id="passInp" placeholder="Пароль">
        <button onclick="auth()">ВОЙТИ</button>
        <div style="text-align:center; font-size:11px; color:#888; cursor:pointer;" onclick="tMode()" id="mode">Нет аккаунта? Регистрация</div>
    </div>
</div>

<div id="chat">
    <div id="msgs"></div>
    <div class="bar">
        <input type="text" id="in" placeholder="Сообщение..." style="flex:1" onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let my = null; // Исправлено: инициализируем null
    let isReg = false;

    // Пытаемся восстановить сессию
    const saved = localStorage.getItem('user_v23');
    if (saved) {
        my = JSON.parse(saved);
        loginSuccess();
    }

    function tMode() {
        isReg = !isReg;
        document.getElementById('title').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('mode').innerText = isReg ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    }

    async function auth() {
        const login = document.getElementById('logInp').value;
        const password = document.getElementById('passInp').value;
        if (!login || !password) return alert("Заполни поля");

        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password, isReg })
        });
        const data = await res.json();
        if (data.error) return alert(data.error);

        my = data;
        localStorage.setItem('user_v23', JSON.stringify(my));
        loginSuccess();
    }

    function loginSuccess() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        socket.emit('join', 'Main');
    }

    socket.on('history', list => {
        document.getElementById('msgs').innerHTML = '';
        list.forEach(add);
    });

    socket.on('renderMsg', add);

    function s


end() {
        const txt = document.getElementById('in');
        if (!txt.value.trim()) return;
        socket.emit('message', { user: my.login, uid: my.uid, text: txt.value, room: 'Main' });
        txt.value = '';
    }

    function add(m) {
        const area = document.getElementById('msgs'), d = document.createElement('div');
        d.className = `m ${m.uid === my.uid ? 'me' : ''}`;
        d.innerHTML = `<div class="u">${m.user} ${m.uid}</div><div>${m.text}</div>`;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
    }
</script>
</body>
</html>
