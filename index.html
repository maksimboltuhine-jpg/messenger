<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger v5.0</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #050505; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

/* Версия */
.version-tag { position: fixed; top: 10px; right: 10px; font-size: 12px; color: #444; z-index: 1001; }

#auth { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
.card { background: #111; padding: 30px; border: 1px solid #222; border-radius: 20px; width: 300px; display: flex; flex-direction: column; gap: 15px; }

input, select, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; }
button { background: #6200ea; border: none; font-weight: bold; cursor: pointer; }

#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; }
#flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

.bubble { padding: 12px 16px; border-radius: 15px; background: #1a1a1a; max-width: 80%; align-self: flex-start; }
.bubble.me { align-self: flex-end; background: #6200ea; }
.author { font-size: 10px; opacity: 0.5; margin-bottom: 4px; }

img, video { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
.dl-btn { display: inline-block; margin-top: 8px; padding: 6px 12px; border: 1px solid #00e676; color: #00e676; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: bold; }

.bar { display: flex; padding: 20px; background: #111; gap: 10px; border-top: 1px solid #222; }
#txt { flex: 1; }
.btn-icon { font-size: 24px; cursor: pointer; color: #6200ea; }
#f-inp { display: none; }
</style>
</head>
<body>

<div class="version-tag">v5.0</div>

<div id="auth">
<div class="card">
<h2 style="text-align:center; color:#6200ea;">ВХОД v5.0</h2>
<input type="text" id="nick" placeholder="Никнейм">
<select id="room">
<option value="Main">Общий чат</option>
<option value="Dev">Разработка</option>
</select>
<button onclick="start()">ВОЙТИ</button>
</div>
</div>

<div id="chat">
<div id="flow"></div>
<div class="bar">
<label for="f-inp" class="btn-icon" id="clip">📎</label>
<input type="file" id="f-inp">
<input type="text" id="txt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<div class="btn-icon" onclick="send()">➤</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Принудительный выбор транспорта для стабильности на Render
const socket = io({ transports: ['websocket', 'polling'] });
let myUser = '', myRoom = '';

function start() {
myUser = document.getElementById('nick').value.trim();
myRoom = document.getElementById('room').value;
if(!myUser) return alert('Ник!');
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
socket.emit('join', { user: myUser, room: myRoom });
}

socket.on('history', (list) => {
document.getElementById('flow').innerHTML = '';
list.forEach(add);
});

socket.on('renderMsg', (m) => add(m));

async function send() {
const t = document.getElementById('txt');
const f = document.getElementById('f-inp');
const c = document.getElementById('clip');

if(!t.value.trim() && !f.files[0]) return;

let fUrl = null, fType = null;
if(f.files[0]) {
c.innerText = '⏳';
const fd = new FormData();
fd.append('file', f.files[0]);
try {
const res = await fetch('/upload', { method: 'POST', body: fd });
const data = await res.json();
fUrl = data.fileUrl; fType = data.fileType;
} catch(e) { console.log(e); }
f.value = ''; c.innerText = '📎';
}

socket.emit('message', { user: myUser, room: myRoom, text: t.value, fileUrl: fUrl, fileType: fType });
t.value = '';
}

function add(m) {
const flow = document.getElementById('flow');
const d = document.createElement('div');
d.className = `bubble ${m.user === myUser ? 'me' : ''}`;

let html = `<div class="author">${m.user}</div>`;
if(m.text) html += `<div>${m.text}</div>`;

if(m.fileUrl) {
const type = m.fileType || '';
if(type.includes('image')) html += `<img src="${m.fileUrl}">`;
else if(type.includes('video')) html += `<video src="${m.fileUrl}" controls></video>`;
else if(type.includes('audio')) html += `<audio src="${m.fileUrl}" controls></audio>`;
html += `<a href="${m.fileUrl}" download class="dl-btn">⬇ СКАЧАТЬ</a>`;
}

d.innerHTML = html;
flow.appendChild(d);
flow.scrollTop = flow.scrollHeight;
}
</script>
</body>
</html>
