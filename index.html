<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v16 ULTIMATE</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --blue: #0066ff; }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Авторизация */
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .box { background: #111; padding: 30px; border-radius: 24px; width: 320px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; }
        button { background: var(--green); color: #000; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        /* Чат */
        #chat-ui { display: none; flex-direction: column; height: 100%; position: relative; max-width: 900px; margin: 0 auto; width: 100%; background: #050505; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; background: #1a1a1a; max-width: 80%; align-self: flex-start; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #0044aa; }
        .uid-tag { cursor: pointer; font-weight: bold; padding: 2px 6px; border-radius: 6px; background: #222; transition: 0.2s; }
        .uid-tag:hover { background: #333; }

        /* Всплывающий звонок */
        #inc-call { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid var(--green); 
            z-index: 9999; text-align: center; box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }

        /* ЭКРАН ЗВОНКА (ИСПРАВЛЕНО ВИДЕО) */
        #call-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; flex-direction: column; }
        .v-wrap { 
            flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        /* Больше не на все лицо. Ограниченный контейнер с сохранением пропорций */
        #r-vid { 
            max-width: 1000px; width: 100%; max-height: 80vh; border-radius: 16px; 
            background: #111; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            object-fit: contain; 
        }
        #l-vid { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid var(--green); object-fit: cover; transform: scaleX(-1); background: #000; z-index: 10; }
        
        .call-btns { height: 90px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #111; border-top: 1px solid #333; }
        .btn-c { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #222; cursor: pointer; }
        .btn-c.off { background: var(--red) !important; }
        .btn-c.active { background: var(--blue) !important; color: #fff; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 style="text-align:center; color:var(--green); margin:0;">MESSENGER</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="auth(false)">ВОЙТИ</button>
        <button onclick="auth(true)" style="background:#222; color:#fff;">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="inc-call">
    <div style="mar


gin-bottom:15px; font-weight:bold">ВХОДЯЩИЙ ВЫЗОВ</div>
    <div style="display:flex; gap:10px">
        <button onclick="acceptCall()">ПРИНЯТЬ</button>
        <button onclick="location.reload()" style="background:var(--red)">ОТКЛОНИТЬ</button>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:15px; background:#111; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
        <span id="user-info" style="font-weight:bold; color:var(--green)"></span>
        <div style="display:flex; gap:5px;">
            <button onclick="const id=prompt('ID:'); if(id) makeCall(id, 'video')" style="padding:8px 12px; font-size:13px">📞 Звонок</button>
            <button onclick="const id=prompt('ID:'); if(id) makeCall(id, 'screen')" style="padding:8px 12px; font-size:13px; background:var(--blue); color:#fff">🖥 Демка</button>
        </div>
    </div>
    
    <div id="msgs"></div>
    
    <div style="padding:15px; background:#111; display:flex; gap:10px; align-items:center; position:relative;">
        <div id="pb" style="position:absolute; top:0; left:0; height:2px; background:var(--green); width:0%; transition:0.2s"></div>
        <input type="file" id="f-in" style="display:none">
        <button onclick="document.getElementById('f-in').click()" style="padding:12px; border-radius:10px; width:50px; background:#222; color:#fff">📎</button>
        <input type="text" id="msg-in" style="flex:1" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()" style="width:60px">➤</button>
    </div>
</div>

<div id="call-screen">
    <div class="v-wrap">
        <video id="r-vid" autoplay playsinline></video>
        <video id="l-vid" autoplay playsinline muted></video>
    </div>
    <div class="call-btns">
        <div class="btn-c" onclick="toggleMic()" id="m-btn">🎤</div>
        <div class="btn-c" onclick="toggleCam()" id="v-btn">📷</div>
        <div class="btn-c" onclick="toggleScreen()" id="s-btn">🖥</div>
        <div class="btn-c" style="background:var(--red)" onclick="location.reload()">📞</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream, screenStream, currentCall;

    if(localStorage.getItem('msgr_v16')) {
        my = JSON.parse(localStorage.getItem('msgr_v16'));
        startApp();
    }

    async function auth(isReg) {
        const login = document.getElementById('l').value, password = document.getElementById('p').value;
        const res = await fetch('/auth', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        my = data;
        localStorage.setItem('msgr_v16', JSON.stringify(my));
        startApp();
    }

    function startApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('user-info').innerText = `${my.login} (#${my.uid})`;
        
        peer = new Peer(my.uid, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('inc-call').style.display = 'block';
        });

        socket.emit('join', 'Main');
    }

    /* --- ЗВОНКИ И ДЕМКА --- */
    async function acceptCall() {
        document.getElementById('inc-call').style.display = 'none';
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        currentCall.answer(localStream);
        showCallUI(currentCall);
    }

    // ТЕПЕРЬ МОЖНО СРАЗУ ЗВОНИТЬ С ДЕМКОЙ
    async function makeCall(id, type = 'video') {
        const cleanId = String(id).replace('#', '');
        
        // ПРОВЕРКА НА ЗВОНОК САМОМУ СЕБЕ
        if (cleanId === String(my.uid)) {
            return alert('Ты пытаешься позвонить сам себе!');
        }

        try {
            if (type === 'screen') {
                localStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                document.getElementById('s-btn').classList.add('active');
            } else {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('s-btn').classList.remove('active');
            }
        } catch (e) {
            return alert("Доступ к камере/экрану отменен.");
        }

        const call = peer.call(cleanId, localStream);
        
        // ИСПРАВЛЕНИЕ ОШИБКИ showCallUI (если ID не найден)
        if (!call) {
            localStream.getTracks().forEach(t => t.stop());
            return alert('Не удалось позвонить. Возможно, пользователь оффлайн или ID неверный.');
        }
        
        showCallUI(call);
    }

    function showCallUI(call) {
        currentCall = call;
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('l-vid').srcObject = localStream;
        call.on('stream', s => document.getElementById('r-vid').srcObject = s);
    }

    /* --- КНОПКИ ВНУТРИ ЗВОНКА --- */
    function toggleMic() {
        const t = localStream.getAudioTracks()[0];
        if(t) { t.enabled = !t.enabled; document.getElementById('m-btn').classList.toggle('off', !t.enabled); }
    }

    function toggleCam() {
        const t = localStream.getVideoTracks()[0];
        if(t) { t.enabled = !t.enabled; document.getElementById('v-btn').classList.toggle('off', !t.enabled); }
    }

    // ИСПРАВЛЕННЫЙ ПЕРЕКЛЮЧАТЕЛЬ ДЕМКИ
    async function toggleScreen() {
        if(!currentCall) return;
        const vSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        const sBtn = document.getElementById('s-btn');
        
        if (!sBtn.classList.contains('active')) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
                vSender.replaceTrack(screenStream.getVideoTracks()[0]);
                document.getElementById('l-vid').srcObject = screenStream;
                sBtn.classList.add('active');
                
                // Если закрыли демку системной кнопкой браузера
                screenStream.getVideoTracks()[0].onended = () => {
                    vSender.replaceTrack(localStream.getVideoTracks()[0]);
                    document.getElementById('l-vid').srcObject = localStream;
                    sBtn.classList.remove('active');
                };
            } catch(e) { console.log("Демка отменена"); }
        } else {
            // Возврат на камеру
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            vSender.replaceTrack(localStream.getVideoTracks()[0]);
            document.getElementById('l-vid').srcObject = localStream;
            sBtn.classList.remove('active');
        }
    }

    /* --- ЧАТ И ФАЙЛЫ --- */
    socket.on('history', h => h.forEach(render));
    socket.on('renderMsg', render);

    async function send() {
        const i = document.getElementById('msg-in');
        const f = document.getElementById('f-in');
        if(!i.value.trim() && !f.files[0]) return;

        let fData = null;
        if(f.files[0]) {
            const fd = new FormData();
            fd.append('file', f.files[0]);
            fData = await new Promise(r => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/upload');
                xhr.upload.onprogress = e => document.getElementById('pb').style.width = (e.loaded/e.total*100)+'%';
                xhr.onload = () => r(JSON.parse(xhr.responseText));
                xhr.send(fd);
            });
            docume


nt.getElementById('pb').style.width = '0%';
            f.value = '';
        }

        socket.emit('message', { 
            user: my.login, uid: my.uid, text: i.value, room: 'Main',
            fileUrl: fData?.fileUrl, fileId: fData?.fileId, fileType: fData?.fileType, fileName: fData?.fileName
        });
        i.value = '';
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${String(m.uid) === String(my.uid) ? 'me' : ''}`;
        
        // Добавлены отдельные кнопки для звонка и демки прямо в чате
        let html = `<div style="font-size:11px; opacity:0.7; margin-bottom:6px; display:flex; align-items:center; gap:5px;">
            ${m.user} 
            <span class="uid-tag" style="color:var(--green)" onclick="makeCall('${m.uid}', 'video')">📞#${m.uid}</span>
            <span class="uid-tag" style="color:var(--blue)" onclick="makeCall('${m.uid}', 'screen')">🖥Демка</span>
        </div>`;
        
        if (m.text) html += `<div style="line-height:1.4;">${m.text}</div>`;
        
        if (m.fileUrl) {
            if (m.fileType && m.fileType.startsWith('image/')) {
                html += `<img src="${m.fileUrl}" style="max-width:100%; border-radius:10px; margin-top:5px; border:1px solid #333;">`;
            } else {
                html += `<a href="${m.fileUrl}" target="_blank" style="color:var(--green); display:block; margin-top:5px; text-decoration:none;">📄 ${m.fileName || 'Файл'}</a>`;
            }
        }
        
        d.innerHTML = html;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
