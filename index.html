<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESSENGER v2.5</title>
<style>
body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.app-container { width: 100%; max-width: 400px; background: #1a1a1a; min-height: 90vh; border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
#auth-screen, #chat-screen, #profile-screen { padding: 20px; display: none; flex-direction: column; height: 100%; }
input { background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; outline: none; }
button { background: #0088ff; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
#messages { flex: 1; overflow-y: auto; background: #000; padding: 15px; display: flex; flex-direction: column; gap: 10px; height: 300px; margin-bottom: 10px; }
.msg { padding: 10px; border-radius: 10px; max-width: 80%; word-break: break-all; }
.msg.me { background: #0088ff; align-self: flex-end; }
.msg.them { background: #333; align-self: flex-start; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #222; }
</style>
</head>
<body>

<div class="app-container">
<div id="auth-screen" style="display: flex;">
<h2 style="color: #0088ff">MESSENGER</h2>
<input type="text" id="username" placeholder="Логин">
<input type="password" id="password" placeholder="Пароль">
<button onclick="auth('login')">ВОЙТИ</button>
<button onclick="auth('register')" style="background:none; color:#555">Регистрация</button>
</div>

<div id="chat-screen">
<div class="header">
<span id="my-name">...</span>
<button onclick="showProfile()" style="padding:5px 10px">⚙</button>
</div>
<input type="text" id="room" placeholder="ID комнаты (напр. 'main')">
<div id="messages"></div>
<div style="display: flex; gap: 5px;">
<input type="text" id="msg" placeholder="Сообщение..." style="flex:1; margin:0">
<button onclick="send()">ОТП</button>
</div>
</div>

<div id="profile-screen">
<h2>ПРОФИЛЬ</h2>
<input type="text" id="avatar-url" placeholder="Ссылка на аватар">
<input type="text" id="status-text" placeholder="Твой статус">
<button onclick="saveProfile()">СОХРАНИТЬ</button>
<button onclick="location.reload()" style="background:#ff3b3b; margin-top:5px">ВЫЙТИ</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let user = JSON.parse(localStorage.getItem('user'));

if(user) showChat();

async function auth(type) {
const res = await fetch('/auth', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ type, username: username.value, password: password.value })
});
const data = await res.json();
if(data.success) {
localStorage.setItem('user', JSON.stringify(data.user));
user = data.user;
showChat();
} else { alert(data.error); }
}

function showChat() {
document.getElementById('auth-screen').style.display = 'none';
document.getElementById('chat-screen').style.display = 'flex';
document.getElementById('profile-screen').style.display = 'none';
document.getElementById('my-name').innerText = user.username;
socket.emit('join', 'main');
}

function showProfile() {
document.getElementById('chat-screen').style.display = 'none';
document.getElementById('profile-screen').style.display = 'flex';
document.getElementById('avatar-url').value = user.avatar || '';
document.getElementById('status-text').value = user.status || '';
}

async function saveProfile() {
user.avatar = document.getElementById('avatar-url').value;
user.status = document.getElementById('status-text').value;
await fetch('/update-profile', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(user)
});
localStorage.setItem('user', JSON.stringify(user));
showChat();
}

function send() {
const text = msg.value.trim();
if(!text) return;
socket.emit('message', { room: 'main', user: user.username, text });
msg.value = '';
}

socket.on('message', (data) => {
const div = document.createElement('div');
div.className = 'msg ' + (data.user === user.username ? 'me' : 'them');
div.innerText = `${data.user}: ${data.text}`;
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
});
</script>
</body>
</html>
