<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ULTIMATE SYSTEM</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<style>
  :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
  * { box-sizing: border-box; outline: none; }
  body { margin: 0; background: var(--bg); color: #fff; font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .box { background: var(--panel); padding: 30px; border-radius: 15px; width: 320px; border: 1px solid var(--border); text-align: center; }
  input, button { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 10px; width: 100%; }
  button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }

  #app { display: none; flex-direction: column; height: 100vh; }
  #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .m { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; max-width: 80%; word-wrap: break-word; }
  .m.me { align-self: flex-end; border-color: var(--green); }
  .m small { color: var(--green); display: block; margin-bottom: 5px; }

  #input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--border); }
  #txt { flex: 1; margin: 0; }

  #call-ui { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
  video { width: 100%; height: 50%; object-fit: cover; background: #111; }
  #local-video { border-top: 2px solid var(--green); }
  .c-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff3b3b; color: #fff; padding: 15px 30px; border-radius: 50px; }
</style>
</head>
<body>

<div id="auth">
  <div class="box">
    <h2 style="color:var(--green)">SYSTEM LOGIN</h2>
    <input id="l" placeholder="Login" autocomplete="off">
    <input id="p" type="password" placeholder="Password" autocomplete="new-password">
    <button onclick="auth()">ACCESS SYSTEM</button>
  </div>
</div>

<div id="app">
  <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
    <span style="color:var(--green)">CONNECTED</span>
    <span id="my-uid"></span>
  </div>
  <div id="msgs"></div>
  <div id="input-area">
    <button onclick="document.getElementById('f').click()" style="width: auto;">📎</button>
    <input type="file" id="f" style="display:none">
    <input id="txt" placeholder="Type..." autocomplete="off">
    <button onclick="send()" style="width: auto;">SEND</button>
  </div>
</div>

<div id="call-ui">
  <video id="remote-video" autoplay playsinline></video>
  <video id="local-video" autoplay playsinline muted></video>
  <button class="c-btn" onclick="location.reload()">HANG UP</button>
</div>

<script>
let my = JSON.parse(localStorage.getItem('sys_user_v2')), socket, peer, localStream;

// Отправка по Enter
document.getElementById('txt').addEventListener('keypress', e => {
  if(e.key === 'Enter') send();
});

async function auth() {
  const login = document.getElementById('l').value, password = document.getElementById('p').value;
  const res = await fetch('/auth', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ login, password })
  });
  const data = await res.json();
  if(data.uid) {
    localStorage.setItem('sys_user_v2', JSON.stringify(data));
    location.reload();
  } else { alert("Error"); }
}

if(my) {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display


= 'flex';
  document.getElementById('my-uid').innerText = '#' + my.uid;
  
  socket = io();
  socket.emit('join', 'MainRoom');
  socket.on('history', h => h.forEach(addMsg));
  socket.on('message', addMsg);

  peer = new Peer(my.uid, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });
  
  peer.on('call', async call => {
    if(confirm("Call from " + call.peer)) {
      localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
      document.getElementById('local-video').srcObject = localStream;
      document.getElementById('call-ui').style.display = 'flex';
      call.answer(localStream);
      call.on('stream', s => document.getElementById('remote-video').srcObject = s);
    }
  });
}

async function send() {
  const txt = document.getElementById('txt'), fInp = document.getElementById('f');
  let fData = null;
  
  if(fInp.files[0]) {
    const fd = new FormData();
    fd.append('file', fInp.files[0]);
    const res = await fetch('/upload', { method: 'POST', body: fd });
    fData = await res.json();
    fInp.value = '';
  }

  if(!txt.value && !fData) return;
  socket.emit('message', { user: my.login, uid: my.uid, text: txt.value, room: 'MainRoom', fileUrl: fData?.fileUrl, fileName: fData?.fileName });
  txt.value = '';
}

function addMsg(m) {
  const div = document.createElement('div');
  div.className = `m ${m.uid === my.uid ? 'me' : ''}`;
  let html = `<small>${m.user} #${m.uid} ${m.uid !== my.uid ? `<span onclick="startCall('${m.uid}')">📞</span>` : ''}</small>`;
  if(m.text) html += `<div>${m.text}</div>`;
  if(m.fileUrl) html += `<a href="${m.fileUrl}" target="_blank" style="color:var(--green)">FILE: ${m.fileName}</a>`;
  div.innerHTML = html;
  document.getElementById('msgs').appendChild(div);
  document.getElementById('msgs').scrollTop = 99999;
}

async function startCall(id) {
  localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
  document.getElementById('local-video').srcObject = localStream;
  document.getElementById('call-ui').style.display = 'flex';
  const call = peer.call(id, localStream);
  call.on('stream', s => document.getElementById('remote-video').srcObject = s);
}
</script>
</body>
</html>
