<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger v11.0</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
#auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
.box { background: #111; padding: 30px; border-radius: 20px; width: 320px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #333; }
input, button { padding: 14px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; }
button { background: #00ff88; color: #000; font-weight: bold; cursor: pointer; border: none; }
.mode-link { text-align: center; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; }

#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; border-left: 1px solid #222; border-right: 1px solid #222; }
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.m { padding: 10px 15px; border-radius: 15px; background: #1a1a1a; max-width: 80%; align-self: flex-start; }
.m.me { align-self: flex-end; background: #0066ff; }
.u { font-size: 10px; opacity: 0.5; margin-bottom: 3px; }
.uid { color: #00ff88; font-weight: normal; }
.bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; }
#in { flex: 1; }
</style>
</head>
<body>
<div id="auth">
<div class="box">
<h2 id="auth-title" style="text-align:center; color:#00ff88; margin:0">ВХОД</h2>
<input type="text" id="l" placeholder="Логин">
<input type="password" id="p" placeholder="Пароль">
<button onclick="handleAuth()" id="auth-btn">ВОЙТИ</button>
<div class="mode-link" onclick="toggleMode()" id="mode-text">Нет аккаунта? Регистрация</div>
</div>
</div>

<div id="chat">
<div id="msgs"></div>
<div class="bar">
<input type="text" id="in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">➤</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myUser = null, isRegMode = false;

function toggleMode() {
isRegMode = !isRegMode;
document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
document.getElementById('auth-btn').innerText = isRegMode ? "СОЗДАТЬ" : "ВОЙТИ";
document.getElementById('mode-text').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
}

async function handleAuth() {
const login = document.getElementById('l').value;
const password = document.getElementById('p').value;
if(!login || !password) return alert("Заполни поля");

const res = await fetch('/auth', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ login, password, isReg: isRegMode })
});
const data = await res.json();
if(data.error) return alert(data.error);

myUser = data;
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
socket.emit('join', 'Main');
}

socket.on('history', list => list.forEach(add));
socket.on('renderMsg', add);

function send() {
const txt = document.getElementById('in');
if(!txt.value.trim()) retu
rn;
socket.emit('message', { user: myUser.login, uid: myUser.uid, text: txt.value, room: 'Main' });
txt.value = '';
}

function add(m) {
const area = document.getElementById('msgs'), d = document.createElement('div');
d.className = `m ${m.uid === myUser.uid ? 'me' : ''}`;
d.innerHTML = `<div class="u">${m.user} <span class="uid">${m.uid}</span></div><div>${m.text}</div>`;
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
