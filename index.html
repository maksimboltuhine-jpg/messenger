<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой Мессенджер</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
.hidden { display: none !important; }
.box { background: #1e1e1e; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 300px; text-align: center; }
input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; outline: none; }
button { padding: 12px; border: none; border-radius: 8px; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; }

#chat-screen { width: 100%; max-width: 800px; height: 95vh; background: #1e1e1e; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }

/* Верхняя панель для групп */
.top-bar { background: #252525; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
.room-controls { display: flex; gap: 10px; }
.room-controls input { padding: 8px; width: 150px; }
.room-controls button { padding: 8px 15px; }

#messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.msg { background: #2b2b2b; padding: 10px 15px; border-radius: 12px; width: fit-content; max-width: 80%; }
.msg b { color: #00f2ff; display: block; font-size: 0.85em; margin-bottom: 3px; }
.time { font-size: 0.7em; color: #888; margin-left: 10px; }
.input-area { padding: 20px; background: #252525; display: flex; gap: 10px; }
</style>
</head>
<body>

<div id="auth-screen">
<div class="box">
<h2>Добро пожаловать</h2>
<input type="text" id="username" placeholder="Придумай никнейм">
<button onclick="login()">ВОЙТИ В ЧАТ</button>
</div>
</div>

<div id="chat-screen" class="hidden">
<div class="top-bar">
<strong id="room-title">Группа: Общий</strong>
<div class="room-controls">
<input type="text" id="room-input" placeholder="Название группы">
<button onclick="changeRoom()">Перейти</button>
</div>
</div>

<div id="messages"></div>

<div class="input-area">
<input type="text" id="msg-input" style="flex-grow: 1;" placeholder="Сообщение...">
<button onclick="send()">Отправить</button>
</div>
</div>

<script>
const socket = io();

function login() {
const u = document.getElementById('username').value;
if(u) socket.emit('set_user', u);
}

socket.on('login_success', () => {
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('chat-screen').classList.remove('hidden');
socket.emit('join_room', 'Общий');
});

function changeRoom() {
const newRoom = document.getElementById('room-input').value;
if(newRoom) {
socket.emit('join_room', newRoom);
document.getElementById('room-input').value = '';
}
}

socket.on('room_changed', (roomName) => {
document.getElementById('room-title').innerText = 'Группа: ' + roomName;
});

function send() {
const i = document.getElementById('msg-input');
if(i.value) { socket.emit('chat_message', i.value); i.value = ''; }
}

socket.on('history', (list) => {
document.getElementById('messages').innerHTML = '';
list.forEach(m => addMsg(m));
});

socket.on('chat_message', (m) => addMsg(m));

function addMsg(data) {
const d = document.createElement('div');
d.className = 'msg';
d.innerHTML = `<b>${data.user}</b>${data.text} <span class="time">${data.time || ''}</span>`;
const b = document.getElementById('messages');
b.appendChild(d);
b.scrollTop = b.scrollHeight;
}

document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
document.getElementById('username').onkeypress = (e) => { if(e.key === 'Enter') login(); };
</script>
</body>
</html>
