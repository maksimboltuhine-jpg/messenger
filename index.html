<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MSGR v13.3 FIXED</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --blue: #0066ff; }
* { box-sizing: border-box; outline: none; }
body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Авторизация */
#auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
.box { background: #111; padding: 30px; border-radius: 24px; width: 340px; border: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
input, button { padding: 15px; border-radius: 14px; border: 1px solid #333; background: #0a0a0a; color: #fff; }
button { background: var(--green); color: #000; font-weight: bold; cursor: pointer; border: none; }

/* Чат */
#chat { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; position: relative; }
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.m { padding: 12px 16px; border-radius: 18px; background: #1a1a1a; max-width: 80%; align-self: flex-start; border: 1px solid #222; }
.m.me { align-self: flex-end; background: var(--blue); border: none; }
.uid-tag { color: var(--green); cursor: pointer; font-weight: bold; margin-left: 5px; }

/* Окно входящего вызова (ПРИНУДИТЕЛЬНО ВИДНОЕ) */
#incoming {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: #1a1a1a;
padding: 30px;
border-radius: 25px;
border: 3px solid var(--green);
z-index: 3000;
text-align: center;
box-shadow: 0 0 50px rgba(0,255,136,0.4);
}

/* Видео контейнер */
#call-overlay { display: none; position: absolute; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
#v-cont { flex: 1; position: relative; width: 100%; }
video { width: 100%; height: 100%; object-fit: cover; }
#local-v { position: absolute; top: 20px; right: 20px; width: 120px; height: 160px; border-radius: 15px; border: 2px solid var(--green); z-index: 10; transform: scaleX(-1); }

.controls { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #0a0a0a; }
.btn-c { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #222; cursor: pointer; }
.btn-c.off { background: var(--red) !important; }
</style>
</head>
<body>

<div id="auth">
<div class="box">
<h2 style="text-align:center; color:var(--green)">MESSENGER</h2>
<input type="text" id="l" placeholder="Логин">
<input type="password" id="p" placeholder="Пароль">
<button onclick="hAuth()">ВОЙТИ</button>
<div style="text-align:center; font-size:12px; color:#666; cursor:pointer" onclick="isR=!isR; this.innerText=isR?'Уже есть аккаунт?':'Создать аккаунт'">Регистрация</div>
</div>
</div>

<div id="incoming">
<h2 style="margin:0 0 20px 0">📞 ВХОДЯЩИЙ ВЫЗОВ</h2>
<div id="caller-id" style="color:var(--green); margin-bottom:20px; font-weight:bold"></div>
<div style="display:flex; gap:15px">
<button onclick="answerCall()" style="background:var(--green); padding:15px 30px">ПРИНЯТЬ</button>
<button onclick="location.reload()" style="background:var(--red); padding:15px 30px">ОТКЛОНИТЬ</button>
</div>
</div>

<div id="chat">
<div style="padding:15px; background:#111; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center">
<div>
<span id="my-info" style="color:var(--green); font-weight:bold"></span>
<div id="peer-status" style="font-size:9px; color:#555">Peer: connecting...</div>
</div>
<button onclick="const t=prompt('Введите UID (4 цифры):'); if(t)startCall(t)" style="font-size:12px">📞 ПОЗВОНИТЬ</button>
</div>

<div id="msgs"></div>

<div id="call-overlay">
<div id="v-cont">
<video id="remote-v" autoplay playsinline></video>
<video id="local-v" autoplay playsinline muted></video>
</div>
<div class="controls">
<div class="btn-c" onclick="toggleMic()" id="m-btn">🎤</div>
<div class="btn-c" onclick="toggleCam()" id="v-btn">📷</div>
<div class="btn-c" style="background:var(--red)" onclick="location.reload()">📞</div>
</div>
</div>

<div style="padding:15px; background:#111; display:flex; gap:10px">
<input type="text" id="in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">➤</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
let socket = io(), peer, my, localStream, currentCall, isR = false;

if(localStorage.getItem('msgr_v13_user')) {
my = JSON.parse(localStorage.getItem('msgr_v13_user'));
loginSuccess();
}

async function hAuth() {
const login = document.getElementById('l').value, password = document.getElementById('p').value;
const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({login, password, isReg: isR})});
const data = await res.json();
if(data.error) return alert(data.error);
my = data;
localStorage.setItem('msgr_v13_user', JSON.stringify(my));
loginSuccess();
}

function loginSuccess() {
document.getElementById('auth').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
document.getElementById('my-info').innerText = `${my.login} (#${my.uid})`;
socket.emit('join', 'Main');

// Создаем Peer
peer = new Peer(my.uid, {
host: location.hostname,
port: location.port || 443,
path: '/peerjs',
secure: true,
debug: 3
});

peer.on('open', id => {
document.getElementById('peer-status').innerText = 'Peer: Online (ID: ' + id + ')';
});

peer.on('call', call => {
currentCall = call;
document.getElementById('caller-id').innerText = "От пользователя #" + call.peer;
document.getElementById('incoming').style.display = 'block';
});

peer.on('error', err => {
document.getElementById('peer-status').innerText = 'Peer Error: ' + err.type;
});
}

async function answerCall() {
document.getElementById('incoming').style.display = 'none';
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
currentCall.answer(localStream);
setupUI(currentCall);
} catch(e) { alert("Нет доступа к камере"); }
}

async function startCall(id) {
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
const call = peer.call(id, localStream);
setupUI(call);
} catch(e) { alert("Ошибка камеры"); }
}

function setupUI(call) {
currentCall = call;
document.getElementById('call-overlay').style.display = 'flex';
document.getElementById('local-v').srcObject = localStream;
call.on('stream', s => document.getElementById('remote-v').srcObject = s);
}

function toggleMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('m-btn').classList.toggle('off', !t.enabled);
}

function toggleCam() {
const t = localStream.getVideoTracks()[0];
t.enabled = !t.enabled;
document.getElementById('v-btn').classList.toggle('off', !t.enabled);
}

// Чат
socket.on('history', l => l.forEach(add));
socket.on('renderMsg', add);
function send() {
const i = document.getElementById('in');
if(!i.value.trim()) return;
socket.emit('message', { user: my.login, uid: my.uid, text: i.value, room: 'Main' });
i.value = '';
}
function add(m) {
const a = document.getElementById('msgs'), d = document.createElement('div');
d.className = `m ${String(m.uid) === String(my.uid) ? 'me' : ''}`;
d.innerHTML = `<div style="font-size:10px; opacity:0.5">${m.user} <span class="uid-tag" onclick="startCall('${m.uid}')">#${m.uid}</span></div>${m.text}`;
a.appendChild(d); a.scrollTop = a.scrollHeight;
}
</script>
</body>
</html>
