<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat Pro</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
.hidden { display: none !important; }
.box { background: #1e1e1e; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 300px; }
input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; outline: none; }
button { padding: 12px; border: none; border-radius: 8px; background: #00f2ff; color: black; font-weight: bold; cursor: pointer; }
#chat-screen { width: 100%; max-width: 600px; height: 90vh; background: #1e1e1e; border-radius: 15px; display: flex; flex-direction: column; }
#messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.msg { background: #2b2b2b; padding: 10px; border-radius: 10px; width: fit-content; }
.msg b { color: #00f2ff; display: block; }
</style>
</head>
<body>

<div id="auth-screen">
<div class="box">
<h2 style="text-align:center">Вход</h2>
<input type="text" id="username" placeholder="Логин">
<input type="password" id="password" placeholder="Пароль">
<button onclick="login()">ВОЙТИ</button>
</div>
</div>

<div id="chat-screen" class="hidden">
<div id="messages"></div>
<div style="padding: 20px; display: flex; gap: 10px; background: #252525;">
<input type="text" id="msg-input" style="flex-grow: 1;" placeholder="Сообщение...">
<button onclick="send()">Отправить</button>
</div>
</div>

<script>
const socket = io();

function login() {
const u = document.getElementById('username').value;
const p = document.getElementById('password').value;
if(u && p) socket.emit('login', { username: u, pass: p });
}

socket.on('login_success', (name) => {
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('chat-screen').classList.remove('hidden');
socket.emit('join_room', 'Общий');
});

socket.on('login_error', (msg) => alert(msg));

function send() {
const i = document.getElementById('msg-input');
if(i.value) { socket.emit('chat_message', i.value); i.value = ''; }
}

socket.on('history', (list) => {
document.getElementById('messages').innerHTML = '';
list.forEach(m => addMsg(m));
});

socket.on('chat_message', (m) => addMsg(m));

function addMsg(data) {
const d = document.createElement('div');
d.className = 'msg';
d.innerHTML = `<b>${data.user}</b> ${data.text}`;
const b = document.getElementById('messages');
b.appendChild(d);
b.scrollTop = b.scrollHeight;
}
</script>
</body>
</html>
