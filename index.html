<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.socket.io; connect-src 'self' wss: https:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE CALL & CHAT</title>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root { --green: #00ff88; --bg: #0a0a0a; --panel: #161616; --border: #333; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { background: #222; padding: 10px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .m b { color: var(--green); display: block; font-size: 11px; }
        #input-area { padding: 15px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; }
        button { background: var(--green); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #call-ui { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        video { width: 90%; max-width: 400px; border-radius: 15px; background: #111; }
    </style>
</head>
<body>

<div id="header">
    <div id="my-id">ID: загрузка...</div>
    <button onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="msgs"></div>

<div id="input-area">
    <input id="txt" placeholder="Сообщение...">
    <button onclick="send()">➤</button>
</div>

<div id="call-ui">
    <video id="remote-v" autoplay playsinline></video>
    <video id="local-v" autoplay playsinline muted style="width:100px; position:absolute; top:20px; right:20px; border:2px solid var(--green);"></video>
    <button onclick="location.reload()" style="margin-top:20px; background:#ff3b3b; color:#fff;">ЗАВЕРШИТЬ</button>
</div>

<script>
    var socket, peer, stream;
    var name = localStorage.getItem('u_name') || prompt("Твоё имя:") || "User";
    localStorage.setItem('u_name', name);

    var uid = localStorage.getItem('u_id') || 'u' + Math.floor(Math.random()*9999);
    localStorage.setItem('u_id', uid);

    // Инициализация сокетов (без стрелочных функций!)
    socket = io();
    socket.emit('join', 'MainRoom');

    socket.on('history', function(ms) {
        ms.forEach(addMsg);
    });

    socket.on('message', function(m) {
        addMsg(m);
    });

    // Инициализация PeerJS
    peer = new Peer(uid, {
        host: window.location.hostname,
        port: 443,
        path: '/peerjs',
        secure: true
    });

    peer.on('open', function(id) {
        document.getElementById('my-id').innerText = "Твой ID: " + id;
    });

    peer.on('call', function(call) {
        if(confirm("Входящий звонок! Ответить?")) {
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(function(s) {
                stream = s;
                call.answer(s);
                showCall(call);
            });
        }
    });

    function send() {
        var i = document.getElementById('txt');
        if(!i.value) return;
        socket.emit('message', { user: name, text: i.value, room: 'MainRoom' });
        i.value = '';
    }

    function addMsg(m) {
        var d = document.createElement('div');
        d.className = 'm';
        d.innerHTML = '<b>' + m.user + '</b>' + m.text;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    function makeCall() {
        var tid = prompt("ID друга:");
        if(!tid) return;
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(function(s) {
            stream = s;
            var call = peer.call(tid, s);
            showCall(call);
        });
    }

    function showCall(call) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('local-v').srcObject = stream;
        call.on('stream', function(rs) {
            document.getElementById('remote-v').srcObject = rs;
        });
    }
</script>
</body>
</html>
