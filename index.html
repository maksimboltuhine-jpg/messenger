<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSGR v17</title>
    <style>
        :root { --green: #00ff88; --red: #ff3b3b; --bg: #000; --blue: #0066ff; }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #auth { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .box { background: #111; padding: 30px; border-radius: 24px; width: 320px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333; }
        input, button { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; }
        button { background: var(--green); color: #000; font-weight: bold; border: none; cursor: pointer; }

        #chat-ui { display: none; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; width: 100%; background: #050505; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; background: #1a1a1a; max-width: 80%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #0044aa; }
        .uid-tag { cursor: pointer; font-weight: bold; color: var(--green); }

        #inc-call { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid var(--green); z-index: 9999; text-align: center; }

        #call-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; flex-direction: column; }
        .v-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #r-vid { max-width: 100%; max-height: 80vh; border-radius: 16px; background: #111; border: 1px solid #333; object-fit: contain; }
        #l-vid { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid var(--green); object-fit: cover; transform: scaleX(-1); }
        
        .call-btns { height: 90px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #111; }
        .btn-c { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #222; cursor: pointer; }
        .btn-c.off { background: var(--red) !important; }
        .btn-c.active { background: var(--blue) !important; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2 style="text-align:center; color:var(--green)">MSGR v17</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="auth(false)">ВОЙТИ</button>
        <button onclick="auth(true)" style="background:#222; color:#fff;">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div id="inc-call">
    <div id="caller-name" style="margin-bottom:15px; font-weight:bold">ВХОДЯЩИЙ ВЫЗОВ</div>
    <div style="display:flex; gap:10px">
        <button onclick="acceptCall()">ПРИНЯТЬ</button>
        <button onclick="location.reload()" style="background:var(--red)">ОТКЛОНИТЬ</button>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:15px; background:#111; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
        <span id="user-info"></span>
        <button onclick="const id=prompt('ID:'); if(id) makeCall(id)" style="padding:5px 15px">📞 Позвонить</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; background:#111; display:flex; gap:10px;">
        <input type="file" id="f-in" style="display


:none">
        <button onclick="document.getElementById('f-in').click()">📎</button>
        <input type="text" id="msg-in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<div id="call-screen">
    <div class="v-wrap">
        <video id="r-vid" autoplay playsinline></video>
        <video id="l-vid" autoplay playsinline muted></video>
    </div>
    <div class="call-btns">
        <div class="btn-c" onclick="toggleMic()" id="m-btn">🎤</div>
        <div class="btn-c" onclick="toggleCam()" id="v-btn">📷</div>
        <div class="btn-c" onclick="toggleScreen()" id="s-btn">🖥</div>
        <div class="btn-c" style="background:var(--red)" onclick="location.reload()">📞</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream, screenStream, currentCall;

    if(localStorage.getItem('msgr_v17')) {
        my = JSON.parse(localStorage.getItem('msgr_v17'));
        startApp();
    }

    async function auth(isReg) {
        const login = document.getElementById('l').value, password = document.getElementById('p').value;
        const res = await fetch('/auth', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        my = data;
        localStorage.setItem('msgr_v17', JSON.stringify(my));
        startApp();
    }

    function startApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('user-info').innerText = `${my.login} (#${my.uid})`;
        
        // ВАЖНО: ID для PeerJS должен быть без решетки!
        const peerId = String(my.uid).replace('#', '');
        peer = new Peer(peerId, { host: location.hostname, port: location.port || 443, path: '/peerjs', secure: true });

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('inc-call').style.display = 'block';
        });

        socket.emit('join', 'Main');
    }

    async function makeCall(id) {
        const cleanId = String(id).replace('#', '');
        if (cleanId === String(my.uid).replace('#', '')) return alert('Нельзя звонить себе');

        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const call = peer.call(cleanId, localStream);
            if (!call) return alert('Пользователь не найден');
            showCallUI(call);
        } catch (e) { alert("Камера недоступна"); }
    }

    async function acceptCall() {
        document.getElementById('inc-call').style.display = 'none';
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        currentCall.answer(localStream);
        showCallUI(currentCall);
    }

    function showCallUI(call) {
        currentCall = call;
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('l-vid').srcObject = localStream;
        call.on('stream', s => document.getElementById('r-vid').srcObject = s);
    }

    async function toggleScreen() {
        const vSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if (!screenStream) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
                vSender.replaceTrack(screenStream.getVideoTracks()[0]);
                document.getElementById('l-vid').srcObject = screenStream;
                document.getElementById('s-btn').classList.add('active');
                screenStream.getVideoTracks()[0].onended = () => toggleScreen();
            } catch(e) {}} else {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            vSender.replaceTrack(localStream.getVideoTracks()[0]);
            document.getElementById('l-vid').srcObject = localStream;
            document.getElementById('s-btn').classList.remove('active');
        }
    }

    function toggleMic() {
        const t = localStream.getAudioTracks()[0];
        t.enabled = !t.enabled; document.getElementById('m-btn').classList.toggle('off', !t.enabled);
    }
    function toggleCam() {
        const t = localStream.getVideoTracks()[0];
        t.enabled = !t.enabled; document.getElementById('v-btn').classList.toggle('off', !t.enabled);
    }

    socket.on('history', h => h.forEach(render));
    socket.on('renderMsg', render);

    async function send() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        socket.emit('message', { user: my.login, uid: my.uid, text: i.value, room: 'Main' });
        i.value = '';
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = `msg ${String(m.uid) === String(my.uid) ? 'me' : ''}`;
        d.innerHTML = `<span class="uid-tag" onclick="makeCall('${m.uid}')">#${m.uid}</span> <b>${m.user}:</b> ${m.text}`;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 99999;
    }
</script>
</body>
</html>
