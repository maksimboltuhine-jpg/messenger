<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Rollback</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #auth { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #chat { display: none; flex-direction: column; height: 100%; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #333; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { background: #222; padding: 8px; margin: 5px 0; border-radius: 10px; width: fit-content; }
        #video-box { display: none; position: fixed; inset: 0; background: #000; z-index: 50; }
        video { width: 100%; height: 50%; background: #111; }
    </style>
</head>
<body>

<div id="auth">
    <h2>Messenger</h2>
    <input type="text" id="l" placeholder="Логин">
    <input type="password" id="p" placeholder="Пароль">
    <button onclick="auth(false)">Войти</button>
    <button onclick="auth(true)">Регистрация</button>
</div>

<div id="chat">
    <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between">
        <b id="my-nick"></b>
        <button onclick="call()">📞 Звонок</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:10px; display:flex">
        <input type="text" id="m" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key=='Enter') send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<div id="video-box">
    <video id="rv" autoplay playsinline></video>
    <video id="lv" autoplay playsinline muted style="height:20%; border:1px solid green"></video>
    <button onclick="location.reload()" style="position:fixed; bottom:20px; left:45%; background:red; color:#fff">СБРОС</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    let socket = io(), peer, my, localStream;

    async function auth(isReg) {
        const login = document.getElementById('l').value;
        const password = document.getElementById('p').value;
        const res = await fetch('/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login, password, isReg})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        my = data;
        start();
    }

    function start() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        document.getElementById('my-nick').innerText = my.login + " (#" + my.uid + ")";

        // Убираем решетку из ID, чтобы PeerJS не ругался
        peer = new Peer('msgr-' + my.uid.replace('#', ''));

        peer.on('call', async (c) => {
            if(confirm("Звонок!")) {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                c.answer(localStream);
                document.getElementById('video-box').style.display = 'block';
                document.getElementById('lv').srcObject = localStream;
                c.on('stream', (s) => { document.getElementById('rv').srcObject = s; });
            }
        });
        socket.emit('join');
    }

    async function call() {
        const id = prompt("Введите ID (только цифры):");
        if(!id) return;
        localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        const c = peer.call('msgr-' + id.replace('#', ''), localStream);
        document.getElementById('video-box').style.display = 'block';
        document.getElementById('lv').srcObject = localStream;
        c.on('stream', (s)=> { document.getElementById('rv').srcObject = s; });
    }

    function send() {
        const m = document.getElementById('m');
        if(m.value) {
            socket.emit('message', { user: my.login, uid: my.uid, text: m.value });
            m.value = '';
        }
    }

    socket.on('history', (h) => { h.forEach(render); });
    socket.on('renderMsg', render);

    function render(data) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `<b>${data.user}</b>: ${data.text}`;
        document.getElementById('msgs').appendChild(d);
        document.getElementById('msgs').scrollTop = 9999;
    }
</script>
</body>
</html>
