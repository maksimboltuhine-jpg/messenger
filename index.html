<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Pro Max</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

/* Вход */
#auth-layer { position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; width: 300px; }
input, select, button { padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
button { background: #ff0044; border: none; font-weight: bold; cursor: pointer; }

/* Чат */
#chat-ui { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; background: #0e0e0e; }
#msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

.bubble { padding: 12px 16px; border-radius: 15px; max-width: 80%; background: #1a1a1a; align-self: flex-start; }
.bubble.me { align-self: flex-end; background: #ff0044; }
.u { font-size: 11px; opacity: 0.5; margin-bottom: 5px; font-weight: bold; }

img, video { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
audio { width: 100%; margin-top: 10px; }

.btn-dl { display: inline-block; margin-top: 10px; padding: 8px 12px; background: rgba(255,255,255,0.1); color: #00ff88; text-decoration: none; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid #00ff88; }

.input-bar { display: flex; padding: 20px; background: #111; gap: 15px; align-items: center; }
#txt-in { flex: 1; padding: 15px; border-radius: 10px; }
.btn-icon { font-size: 24px; cursor: pointer; color: #ff0044; }
#f-in { display: none; }
</style>
</head>
<body>

<div id="auth-layer">
<div class="card">
<h1 style="color:#ff0044; text-align:center;">MESSENGER</h1>
<input type="text" id="nick" placeholder="Твой ник">
<select id="room">
<option value="Общий">Общий</option>
<option value="Группа 1">Группа 1</option>
<option value="Группа 2">Группа 2</option>
</select>
<button onclick="login()">ВОЙТИ</button>
</div>
</div>

<div id="chat-ui">
<div id="msg-flow"></div>
<div class="input-bar">
<label for="f-in" class="btn-icon" id="clip">📎</label>
<input type="file" id="f-in">
<input type="text" id="txt-in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
<div class="btn-icon" onclick="send()">➤</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myUser = '', myRoom = '';

function login() {
myUser = document.getElementById('nick').value.trim();
myRoom = document.getElementById('room').value;
if(!myUser) return alert('Ник!');
document.getElementById('auth-layer').style.display = 'none';
document.getElementById('chat-ui').style.display = 'flex';
socket.emit('join', { user: myUser, room: myRoom });
}

socket.on('history', (list) => list.forEach(add));
socket.on('renderMsg', (m) => add(m));

async function send() {
const t = document.getElementById('txt-in');
const f = document.getElementById('f-in');
const c = document.getElementById('clip');

if(!t.value.trim() && !f.files[0]) return;

let fUrl = null, fType = null;
if(f.files[0]) {
c.innerText = '⏳';
const fd = new FormData();
fd.append('file', f.files[0]);
try {
const res = await fetch('/upload', { method: 'POST', body: fd });
const data = await res.json();
fUrl = data.fileUrl; fType = data.fileType;
} catch(e) { alert('Ошибка загрузки'); }
f.value = ''; c.innerText = '📎';
}

socket.emit('message', { user: myUser, room: myRoom, text: t.value, fileUrl: fUrl, fileType: fType });
t.value = '';
}

function add(m) {
const flow = document.getElementById('msg-flow');
const d = document.createElement('div');
d.className = `bubble ${m.user === myUser ? 'me' : ''}`;

let html = `<div class="u">${m.user}</div>`;
if(m.text) html += `<div>${m.text}</div>`;

if(m.fileUrl) {
const type = m.fileType || '';
if(type.includes('image')) html += `<img src="${m.fileUrl}">`;
else if(type.includes('video')) html += `<video src="${m.fileUrl}" controls></video>`;
else if(type.includes('audio')) html += `<audio src="${m.fileUrl}" controls></audio>`;
else html += `<div style="margin-top:10px; opacity:0.5;">📎 Файл</div>`;
html += `<a href="${m.fileUrl}" download class="btn-dl">⬇ СКАЧАТЬ</a>`;
}

d.innerHTML = html;
flow.appendChild(d);
flow.scrollTop = flow.scrollHeight;
}
</script>
</body>
</html>
