<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE MESSENGER</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
:root { --green:#00ff88; --bg:#0a0a0a; --panel:#161616; }
body { margin:0; background:var(--bg); color:#fff; font-family:sans-serif; }
#auth { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; background:#000; }
.box { background:#161616; padding:20px; border-radius:15px; display:flex; flex-direction:column; gap:10px; }
input,button { padding:10px; border:none; border-radius:8px; }
button { background:var(--green); }

#app { display:none; height:100vh; display:flex; flex-direction:column; }
#msgs { flex:1; overflow:auto; padding:10px; }
.m { background:#222; padding:10px; margin:5px; border-radius:10px; }
.me { background:#0b2217; }

#call { position:fixed; inset:0; display:none; justify-content:center; align-items:center; flex-direction:column; background:#000; }
video { width:300px; background:#000; margin:10px; }
</style>
</head>
<body>

<div id="auth">
  <div class="box">
    <input id="l" placeholder="логин">
    <input id="p" type="password" placeholder="пароль">
    <button onclick="login()">Войти / Рег</button>
  </div>
</div>

<div id="app">
  <div>Мой ID: <span id="myid"></span></div>

  <div id="msgs"></div>

  <input id="txt">
  <input type="file" id="file">
  <button onclick="send()">Отправить</button>
</div>

<div id="call">
  <video id="local" autoplay muted></video>
  <video id="remote" autoplay></video>
  <button onclick="end()">Сброс</button>
</div>

<script>
let my = JSON.parse(localStorage.getItem('u'));
let socket, peer, localStream, call;

if (my) init();

async function login() {
  const login = l.value;
  const password = p.value;

  const res = await fetch('/auth', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ login, password, isReg:true })
  });

  const data = await res.json();
  my = data;
  localStorage.setItem('u', JSON.stringify(my));
  init();
}

function init() {
  auth.style.display='none';
  app.style.display='flex';

  myid.innerText = my.uid;

  socket = io();

  socket.emit('join','room');

  socket.on('history', ms => {
    msgs.innerHTML='';
    ms.forEach(add);
  });

  socket.on('message', add);

  // 🔥 FIXED PEER
  peer = new Peer(my.uid, {
    host: location.hostname,
    port: location.port || 3000,
    path: '/peerjs',

    config: {
      iceServers: [
        { urls:'stun:stun.l.google.com:19302' },
        {
          urls:'turn:openrelay.metered.ca:80',
          username:'openrelayproject',
          credential:'openrelayproject'
        }
      ]
    }
  });

  peer.on('call', incoming);
}

function add(m) {
  const div = document.createElement('div');
  div.className = 'm ' + (m.uid===my.uid?'me':'');

  div.innerHTML = `
    <b>${m.user}</b> (#${m.uid})
    <button onclick="startCall('${m.uid}')">📞</button>
    <div>${m.text||''}</div>
    ${m.fileUrl ? `<a href="${m.fileUrl}" target="_blank">📎 файл</a>`:''}
  `;

  msgs.appendChild(div);
}

async function send() {
  let fileData=null;

  if (file.files[0]) {
    const fd = new FormData();
    fd.append('file', file.files[0]);

    const res = await fetch('/upload',{method:'POST',body:fd});
    fileData = await res.json();
  }

  socket.emit('message',{
    user: my.login,
    uid: my.uid,
    text: txt.value,
    room:'room',
    fileUrl: fileData?.fileUrl,
    fileName: fileData?.fileName,
    fileType: fileData?.fileType
  });

  txt.value='';
  file.value='';
}

async function media() {
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  local.srcObject = localStream;
}

async function startCall(id) {
  await media();

  document.getElementById('call').style.display='flex';

  call = peer.call(id, localStream);

  call.on('stream', s => {
    remote.srcObject = s;
  });
}

async function incoming(c) {
  if (!confirm("Входящий звонок")) return;

  await media();

  document.getElementById('call').style.display='flex';

  call = c;
  c.answer(localStream);

  c.on('stream', s => {
    remote.srcObject = s;
  });
}

function end() {
  if (call) call.close();
  document.getElementById('call').style.display='none';
}
</script>

</body>
</html>
